<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile Chat Multi-Rooms</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background-color: #111b21; color: #e9edef; display: flex; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #222e35; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111b21; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #8696a0; }
        .login-box input, .login-box select { width: 100%; padding: 12px; background: #2a3942; border: 1px solid #3b4a54; border-radius: 6px; color: white; font-size: 16px; outline: none; }
        .phone-input-container { display: flex; gap: 8px; }
        .phone-input-container select { width: 35%; }
        .login-btn { width: 100%; padding: 12px; background: #00a884; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { background: #008f71; }
        
        #main-layout { display: flex; width: 100vw; height: 100vh; position: relative; }
        #sidebar { width: 320px; background-color: #111b21; border-left: 1px solid #222e35; display: flex; flex-direction: column; transition: 0.3s; z-index: 10; }
        .sidebar-header { padding: 15px; background-color: #202c33; font-weight: bold; display: flex; justify-content: space-between; align-items: center; color: #e9edef; }
        .room-controls-buttons { display: flex; gap: 5px; width: 100%; padding: 10px; background: #111b21; }
        .add-room-btn { flex: 1; background: #00a884; color: white; border: none; padding: 8px 5px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        #rooms-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-section-title { padding: 10px 5px; font-size: 12px; color: #8696a0; font-weight: bold; text-transform: uppercase; }
        .room-item { padding: 12px 15px; border-bottom: 1px solid #222e35; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 4px; transition: 0.2s; }
        .room-item:hover { background-color: #202c33; }
        .room-item.active { background-color: #202c33; color: #00a884; font-weight: bold; border-right: 4px solid #00a884; }
        .delete-room-x { color: #ff4d4d; font-weight: bold; cursor: pointer; padding: 0 5px; }
        .sidebar-footer { padding: 10px; background: #202c33; text-align: center; font-size: 11px; color: #8696a0; border-top: 1px solid #222e35; }
        
        #chat-container { flex: 1; display: flex; flex-direction: column; background-color: #222e35; position: relative; }
        header { background: #202c33; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222e35; min-height: 60px; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        #toggle-sidebar-btn { display: none; background: none; border: none; color: #00a884; font-size: 20px; cursor: pointer; }
        .call-btn { background: #2a3942; border: none; font-size: 14px; padding: 8px 12px; border-radius: 20px; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .call-btn:hover { background: #3b4a54; }
        .call-btn.video-btn { background: #00a884; }
        .call-btn.video-btn:hover { background: #008f71; }
        .nile-ai-btn { background: #8a2be2; }
        .nile-ai-btn:hover { background: #6a1b9a; }
        
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity: 0.06; }
        .message { padding: 10px 14px; border-radius: 8px; max-width: 65%; word-wrap: break-word; display: flex; flex-direction: column; position: relative; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .message .sender-tag { font-size: 11px; font-weight: bold; color: #34b7f1; margin-bottom: 4px; text-align: right; }
        .message.sent { background: #005c4b; align-self: flex-end; border-top-left-radius: 0; color: #e9edef; }
        .message.received { background: #202c33; align-self: flex-start; border-top-right-radius: 0; color: #e9edef; }
        .message img, .message video { max-width: 100%; border-radius: 6px; margin-top: 5px; max-height: 250px; object-fit: cover; }
        
        .reply-box-in-msg { background: rgba(0, 0, 0, 0.2); border-right: 3px solid #00a884; padding: 5px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; color: #b1c3cb; }
        .msg-actions { display: flex; gap: 8px; margin-top: 5px; font-size: 11px; align-self: flex-x; justify-content: flex-end; }
        .action-link { color: #8696a0; cursor: pointer; text-decoration: none; }
        .action-link:hover { color: #00a884; }
        
        #reply-preview { background: #1f2c34; padding: 10px; border-right: 4px solid #00a884; display: none; justify-content: space-between; align-items: center; font-size: 13px; color: #e9edef; }
        
        #emoji-picker { position: absolute; bottom: 70px; right: 20px; background: #233138; border: 1px solid #3b4a54; border-radius: 8px; padding: 10px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; z-index: 100; }
        .emoji-item { cursor: pointer; font-size: 20px; text-align: center; transition: 0.1s; }
        .emoji-item:hover { transform: scale(1.2); }
        
        footer { display: flex; padding: 15px; gap: 10px; background-now: #202c33; border-top: 1px solid #222e35; align-items: center; position: relative; }
        #message-input { flex: 1; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        .footer-icon-btn { background: #2a3942; padding: 10px; border-radius: 50%; color: #8696a0; cursor: pointer; border: none; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .footer-icon-btn:hover { color: white; background: #3b4a54; }
        #send-btn { background-color: #00a884; color: white; }
        #send-btn:hover { background-color: #008f71; }
        
        /* شاشة الكاميرا والمكالمات المعدلة بدون تكرار */
        #video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(17, 27, 33, 0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-box { display: flex; gap: 15px; width: 90%; max-width: 800px; justify-content: center; margin-bottom: 20px; }
        video { width: 45%; background: #000; border-radius: 12px; transform: scaleX(-1); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .call-controls { display: flex; gap: 15px; }
        .call-ctrl-btn { padding: 12px 24px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }
        .hangup-btn { background: #ff4d4d; }
        .mute-btn { background: #3b4a54; }
        
        /* 🚨 عنصر نافذة الـ QR كود المفقود الذي أصلح الزرار */
        #qr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; }
        .qr-content { background: #222e35; padding: 25px; border-radius: 12px; text-align: center; color: white; max-width: 300px; width: 90%; }
        #qrcode { margin: 15px auto; padding: 10px; background: white; border-radius: 8px; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .close-qr-btn { background: #ff4d4d; border: none; padding: 8px 16px; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; top: 0; bottom: 0; right: 0; width: 100%; transform: translateX(100%); }
            body.sidebar-hidden #sidebar { transform: translateX(0); }
            #toggle-sidebar-btn { display: block; }
        }
    </style>
</head>
<body class="sidebar-hidden">

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#00a884; margin-bottom:15px;"><i class="fa-solid fa-comments"></i> نايل شات 🔒</h2>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> اسم البروفايل:</label>
                <input type="text" id="login-name" placeholder="اكتب اسمك هنا...">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> رقم الهاتف:</label>
                <div class="phone-input-container">
                    <select id="login-country">
                        <option value="+20">+20 (مصر)</option>
                        <option value="+966">+966 (السعودية)</option>
                        <option value="+971">+971 (الإمارات)</option>
                    </select>
                    <input type="tel" id="login-phone" placeholder="123456789">
                </div>
            </div>
            <button class="login-btn" onclick="submitLogin()"><i class="fa-solid fa-door-open"></i> دخول وتفعيل النظام 🚀</button>
            <div style="margin-top: 25px; font-size: 11px; color: #8696a0; font-family: monospace;">
                Created by ABDULLAH MOHAMED SHABAN MOHANNA
            </div>
        </div>
    </div>

    <div id="main-layout">
        <div id="sidebar">
            <div class="sidebar-header">
                <span><i class="fa-solid fa-sliders"></i> إدارة المحادثات والجروبات</span>
                <button onclick="toggleQRModal()" class="add-room-btn" style="background:#3b4a54; max-width:80px;"><i class="fa-solid fa-qrcode"></i> QR</button>
            </div>
            <div class="room-controls-buttons">
                <button class="add-room-btn" onclick="createNewRoom('public')"><i class="fa-solid fa-plus"></i> جروب عام</button>
                <button class="add-room-btn" style="background:#721c24;" onclick="createNewRoom('private')"><i class="fa-solid fa-lock"></i> جروب برقم سري</button>
                <button class="add-room-btn" style="background:#005c4b;" onclick="createNewSecretDM()"><i class="fa-solid fa-user-shield"></i> شات خاص مباشر</button>
            </div>
            
            <div id="rooms-list">
                <div class="room-section-title"><i class="fa-solid fa-users"></i> المجموعات المشتركة</div>
                <div id="server-rooms"></div>
                <div class="room-section-title"><i class="fa-solid fa-user-lock"></i> شات خاص مباشر (برقم الهاتف)</div>
                <div id="private-dms"></div>
            </div>
            
            <div class="sidebar-footer">
                Created by Abdullah Mohamed Shaban Mohanna
            </div>
        </div>

        <div id="chat-container">
            <header>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="toggle-sidebar-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <h3 id="chat-header-title" style="font-weight: bold;"><i class="fa-solid fa-circle-notch fa-spin"></i> برجاء اختيار محادثة أو إنشاء جروب...</h3>
                </div>
                <div class="header-controls" id="call-actions" style="display:none;">
                    <button class="call-btn nile-ai-btn" onclick="askNileAI()"><i class="fa-solid fa-robot"></i> NileAI صوتي</button>
                    <button class="call-btn" onclick="startCall('audio')"><i class="fa-solid fa-phone"></i> صوت</button>
                    <button class="call-btn video-btn" onclick="startCall('video')"><i class="fa-solid fa-video"></i> فيديو</button>
                </div>
            </header>

            <div id="chat-window"></div>

            <div id="reply-preview">
                <span id="reply-preview-text"></span>
                <i class="fa-solid fa-xmark" style="cursor:pointer; color:#ff4d4d;" onclick="cancelReply()"></i>
            </div>

            <div id="emoji-picker"></div>

            <footer id="chat-footer" style="display:none;">
                <button class="footer-icon-btn" onclick="toggleEmojiPicker()"><i class="fa-solid fa-face-smile"></i></button>
                <label class="footer-icon-btn" for="file-input"><i class="fa-solid fa-paperclip"></i></label>
                <input type="file" id="file-input" accept="image/*,video/*" style="display:none;" onchange="sendFile()">
                
                <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." onkeypress="handleKeyPress(event)">
                <button class="footer-icon-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </footer>
        </div>
    </div>

    <div id="video-overlay">
        <h2 id="call-status" style="margin-bottom: 20px; color: #00a884;"><i class="fa-solid fa-phone-volume fa-bounce"></i> جاري الاتصال...</h2>
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="call-controls">
            <button class="call-ctrl-btn mute-btn" onclick="toggleMute()"><i class="fa-solid fa-microphone-slash"></i> كتم</button>
            <button class="call-ctrl-btn hangup-btn" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i> إنهاء المكالمة</button>
        </div>
    </div>

    <div id="qr-modal" onclick="closeQRModalOutside(event)">
        <div class="qr-content">
            <h3><i class="fa-solid fa-qrcode"></i> كود الـ QR للشات</h3>
            <p style="font-size:12px; color:#8696a0; margin-top:5px;">امسح الكود لفتح التطبيق ومشاركة اللينك فوراً</p>
            <div id="qrcode"></div>
            <button class="close-qr-btn" onclick="toggleQRModal()"><i class="fa-solid fa-circle-xmark"></i> إغلاق</button>
        </div>
    </div>

    <script>
        const socket = io({ transports: ['polling'] });
        let myName = localStorage.getItem('myName');
        let myPhone = localStorage.getItem('myPhone');
        let secretDMs = JSON.parse(localStorage.getItem('secretDMs')) || [];
        let currentRoom = "";
        let roomPasscodes = {};
        let replyingToId = null;
        let isMuted = false;

        // إعداد الـ WebRTC والاتصال
        let localStream, peerConnection;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.lgoogle.com:19302' }] };
        const emojis = ['😀','😂','😃','😄','😅','😆','😉','😊','😋','😎','😍','😘','😗','😙','😚','🙂','🤗','🤩'];

        // تشغيل النظام فور التحميل
        window.onload = function() {
            if (myName && myPhone) {
                var loginScreen = document.getElementById('login-screen');
                if (loginScreen) loginScreen.style.display = 'none';
                initChat();
            }
            initEmojis();
            // طلب إذن الإشعارات تلقائياً
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        };

        // تفعيل زر الـ QR كود وإظهاره بشكل صحيح 100%
        function toggleQRModal() {
            var modal = document.getElementById('qr-modal');
            var qrContainer = document.getElementById('qrcode');
            if (!modal || !qrContainer) return;

            if (modal.style.display !== 'flex') {
                modal.style.display = 'flex';
                qrContainer.innerHTML = '';
                try {
                    new QRCode(qrContainer, {
                        text: window.location.href,
                        width: 160,
                        height: 160,
                        colorDark : "#111b21",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                } catch(e) {
                    console.error("خطأ أثناء تحميل مكتبة الـ QR كود:", e);
                }
            } else {
                modal.style.display = 'none';
            }
        }
        
        function closeQRModalOutside(e) {
            if(e.target.id === 'qr-modal') toggleQRModal();
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-hidden');
        }

        function submitLogin() {
            const name = document.getElementById('login-name').value.trim();
            const phoneCode = document.getElementById('login-country').value;
            const phoneNum = document.getElementById('login-phone').value.trim();
            const fullPhone = phoneCode + phoneNum;
            
            if(!name || !phoneNum) return alert("الرجاء إدخال البيانات كاملة!");
            
            localStorage.setItem('myName', name);
            localStorage.setItem('myPhone', fullPhone);
            myName = name;
            myPhone = fullPhone;
            
            document.getElementById('login-screen').style.display = 'none';
            initChat();
        }

        function initChat() {
            socket.emit('get_all_rooms', { phone: myPhone });
            renderSecretDMs();
        }

        function initEmojis() {
            const picker = document.getElementById('emoji-picker');
            if(!picker) return;
            emojis.forEach(e => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = e;
                span.onclick = () => {
                    document.getElementById('message-input').value += e;
                };
                picker.appendChild(span);
            });
        }

        function toggleEmojiPicker() {
            const p = document.getElementById('emoji-picker');
            p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        }

        function createNewRoom(type) {
            const name = prompt("ادخل اسم الجروب الجديد:");
            if(!name || name.trim() === "") return;
            let password = "";
            if(type === 'private') {
                password = prompt("ادخل باسورد الجروب الخاص:");
                if(!password) return alert("لا يمكن إنشاء جروب خاص بدون باسورد!");
            }
            socket.emit('create_new_room_server', { name: name.trim(), type: type, password: password, phone: myPhone });
        }

        function createNewSecretDM() {
            const target = prompt("أدخل رقم هاتف الشخص المراد مراسلته بالكامل (مثال: +20123456789):");
            if (!target || target.trim() === "") return;
            if (target.trim() === myPhone) return alert("لا يمكنك مراسلة نفسك!");
            
            const roomName = [myPhone, target.trim()].sort().join('~');
            if (!secretDMs.includes(roomName)) {
                secretDMs.push(roomName);
                localStorage.setItem('secretDMs', JSON.stringify(secretDMs));
            }
            renderSecretDMs();
            joinRoomAction(roomName, 'dm');
        }

        socket.on('receive_rooms_list', function(rooms) {
            const container = document.getElementById('server-rooms');
            if(!container) return;
            container.innerHTML = '';
            rooms.forEach(r => {
                roomPasscodes[r.name] = r.password;
                const div = document.createElement('div');
                div.className = `room-item ${currentRoom === r.name ? 'active' : ''}`;
                div.innerHTML = `<span><i class="fa-solid ${r.type==='public'?'fa-earth-africa':'fa-shield-halved'}"></i> ${r.name}</span>`;
                div.onclick = () => {
                    if(r.type === 'private') {
                        const pass = prompt("الجروب محمي، ادخل الرقم السري:");
                        if(pass !== r.password) return alert("الرمز غير صحيح!");
                    }
                    joinRoomAction(r.name, 'group');
                };
                container.appendChild(div);
            });
        });

        function renderSecretDMs() {
            const container = document.getElementById('private-dms');
            if(!container) return;
            container.innerHTML = '';
            secretDMs.forEach(room => {
                const peerPhone = room.replace(myPhone, '').replace('~', '');
                const div = document.createElement('div');
                div.className = `room-item ${currentRoom === room ? 'active' : ''}`;
                div.innerHTML = `<span><i class="fa-solid fa-user-lock" style="color:#00a884;"></i> شات: ${peerPhone}</span>`;
                div.onclick = () => joinRoomAction(room, 'dm');
                container.appendChild(div);
            });
        }

        function joinRoomAction(roomName, mode) {
            currentRoom = roomName;
            document.getElementById('call-actions').style.display = 'flex';
            document.getElementById('chat-footer').style.display = 'flex';
            
            let titleText = mode === 'dm' ? `شات خاص: ${roomName.replace(myPhone,'').replace('~','')}` : `جروب: ${roomName}`;
            document.getElementById('chat-header-title').innerText = titleText;
            
            document.getElementById('chat-window').innerHTML = '';
            socket.emit('join_room', { room: roomName, name: myName, phone: myPhone });
            
            renderSecretDMs();
            initChat();
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function handleKeyPress(e) {
            if(e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const msg = input.value.trim();
            if(!msg || !currentRoom) return;
            
            const payload = {
                room: currentRoom,
                sender: myName,
                phone: myPhone,
                text: msg,
                type: 'text',
                replyTo: replyingToId
            };
            socket.emit('send_room_message', payload);
            input.value = '';
            cancelReply();
            document.getElementById('emoji-picker').style.display = 'none';
        }

        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file || !currentRoom) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const fileType = file.type.split('/')[0]; // image or video
                const payload = {
                    room: currentRoom,
                    sender: myName,
                    phone: myPhone,
                    fileData: e.target.result,
                    type: fileType === 'image' ? 'image' : 'video'
                };
                socket.emit('send_room_file', payload);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        // استقبال وعرض الرسائل بنظام الإشعارات المطور والنغمات 🎧
        socket.on('new_message', function(data) {
            if(data.room !== currentRoom) {
                // تفعيل ميزة الإشعارات التنبيهية المتطورة للغرف الخلفية
                if (Notification.permission === "granted") {
                    new Notification(`رسالة جديدة من ${data.sender}`, { body: data.text || "أرسل ملفاً جديداً" });
                }
                // تشغيل صوت تنبيه مميز
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                return;
            }
            
            const win = document.getElementById('chat-window');
            const isMe = data.phone === myPhone;
            
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'sent' : 'received'}`;
            
            let replyHTML = "";
            if (data.replyTo) {
                replyHTML = `<div class="reply-box-in-msg">رد على: ${data.replyTo}</div>`;
            }

            let contentHTML = `<span class="sender-tag">${data.sender} (${data.phone})</span> ${replyHTML}`;
            if(data.type === 'image') {
                contentHTML += `<img src="${data.fileData}">`;
            } else if(data.type === 'video') {
                contentHTML += `<video src="${data.fileData}" controls></video>`;
            } else {
                contentHTML += `<span>${data.text}</span>`;
            }
            
            contentHTML += `
                <div class="msg-actions">
                    <span class="action-link" onclick="setupReply('${data.sender}', '${data.text || 'ملف'}')"><i class="fa-solid fa-reply"></i> رد</span>
                </div>
            `;
            
            div.innerHTML = contentHTML;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        });

        function setupReply(sender, text) {
            replyingToId = `${sender}: ${text}`;
            document.getElementById('reply-preview-text').innerText = `جاري الرد على ${replyingToId}`;
            document.getElementById('reply-preview').style.display = 'flex';
        }

        function cancelReply() {
            replyingToId = null;
            document.getElementById('reply-preview').style.display = 'none';
        }

        // ذكاء اصطناعي NileAI مدمج
        function askNileAI() {
            const promptStr = prompt("اسأل ذكاء نايل الاصطناعي NileAI:");
            if(!promptStr) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="message sent"><span class="sender-tag">أنت</span><span>سؤال لـ NileAI: ${promptStr}</span></div>`;
            
            // محاكاة إجابة الذكاء الاصطناعي السريعة
            setTimeout(() => {
                socket.emit('send_room_message', {
                    room: currentRoom,
                    sender: '🤖 NileAI الذكي',
                    phone: 'System',
                    text: `مرحباً عبده، قمت بتحليل طلبك للبرمجة [${promptStr}]، نظام المحادثات شغال بأعلى كفاءة WebRTC مدمجة وبدون تداخل!`,
                    type: 'text'
                });
            }, 1000);
        }

        // ==================== ميزة المكالمات المصلحة والخفيفة 100% ====================
        function startCall(type) {
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('call-status').innerText = "جاري الاتصال وتهيئة السيرفر النظيف...";
            
            navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' })
            .then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                
                peerConnection = new RTCPeerConnection(rtcConfig);
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
                
                peerConnection.onicecandidate = e => {
                    if (e.candidate) socket.emit('ice_candidate', { candidate: e.candidate, room: currentRoom });
                };
                
                peerConnection.ontrack = e => {
                    document.getElementById('remoteVideo').srcObject = e.streams[0];
                    document.getElementById('call-status').innerText = "المكالمة نشطة الآن 🟢";
                };

                peerConnection.createOffer().then(offer => {
                    return peerConnection.setLocalDescription(offer);
                }).then(() => {
                    socket.emit('call_offer', { offer: peerConnection.localDescription, room: currentRoom });
                });
            }).catch(err => {
                alert("لم نستطع فتح الكاميرا أو المايك: " + err);
                endCall();
            });
        }

        socket.on('call_offer', function(data) {
            if(!peerConnection) {
                document.getElementById('video-overlay').style.display = 'flex';
                document.getElementById('call-status').innerText = "استقبال مكالمة واردة...";
                
                navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                .then(stream => {
                    localStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    
                    peerConnection = new RTCPeerConnection(rtcConfig);
                    stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
                    
                    peerConnection.onicecandidate = e => {
                        if (e.candidate) socket.emit('ice_candidate', { candidate: e.candidate, room: currentRoom });
                    };
                    
                    peerConnection.ontrack = e => {
                        document.getElementById('remoteVideo').srcObject = e.streams[0];
                        document.getElementById('call-status').innerText = "المكالمة نشطة الآن 🟢";
                    };

                    return peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                }).then(() => {
                    return peerConnection.createAnswer();
                }).then(answer => {
                    return peerConnection.setLocalDescription(answer);
                }).then(() => {
                    socket.emit('call_answer', { answer: peerConnection.localDescription, room: currentRoom });
                });
            }
        });

        socket.on('call_answer', function(data) {
            if(peerConnection) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('ice_candidate', function(data) {
            if(peerConnection) {
                peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error(e));
            }
        });

        function toggleMute() {
            if(localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
                document.querySelector('.mute-btn').innerHTML = isMuted ? `<i class="fa-solid fa-microphone"></i> تشغيل الصوت` : `<i class="fa-solid fa-microphone-slash"></i> كتم`;
            }
        }

        function endCall() {
            if(peerConnection) peerConnection.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            peerConnection = null;
            localStream = null;
            document.getElementById('video-overlay').style.display = 'none';
            socket.emit('hangup_call', { room: currentRoom });
        }

        socket.on('hangup_call', function() {
            if(peerConnection) peerConnection.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            peerConnection = null;
            localStream = null;
            document.getElementById('video-overlay').style.display = 'none';
        });
    </script>
</body>
</html>
