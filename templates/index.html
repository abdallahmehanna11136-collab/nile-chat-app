<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nile Chat Ultra</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --wa-green: #00a884; --wa-dark-bg: #0b141a; --wa-header-bg: #111b21;
            --wa-surface: #222e35; --wa-bubble-sent: #005c4b; --wa-bubble-recv: #202c33;
            --wa-text: #e9edef; --wa-muted: #8696a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: var(--wa-dark-bg); color: var(--wa-text); overflow: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: #111b21; border-radius: 12px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        .login-input { width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff; margin-bottom: 15px; text-align: right; outline: none; }
        .login-btn { padding: 12px 20px; background: var(--wa-green); border: none; border-radius: 8px; color: #111b21; font-weight: bold; cursor: pointer; }
        
        #phone-wrapper { width: 100%; height: 100%; display: none; flex-direction: column; }
        .app-header { background: var(--wa-header-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--wa-surface); }
        
        .main-content { flex: 1; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        
        .list-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--wa-surface); cursor: pointer; }
        .list-item:hover { background: #202c33; }
        .item-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--wa-surface); display: flex; justify-content: center; align-items: center; margin-left: 15px; color: var(--wa-green); overflow: hidden; }
        .item-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .item-details { flex: 1; }
        .item-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .item-msg { color: var(--wa-muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-dark-bg); z-index: 500; display: none; flex-direction: column; }
        .chat-header { background: var(--wa-header-bg); padding: 12px; display: flex; align-items: center; border-bottom: 1px solid var(--wa-surface); }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-bubble { max-width: 75%; padding: 10px; border-radius: 8px; font-size: 15px; position: relative; word-break: break-word; }
        .msg-bubble.sent { background: var(--wa-bubble-sent); align-self: flex-start; }
        .msg-bubble.received { background: var(--wa-bubble-recv); align-self: flex-end; }
        .reaction-badge { position: absolute; bottom: -10px; left: 10px; background: var(--wa-surface); border-radius: 10px; padding: 2px 6px; font-size: 12px; z-index: 10; }
        
        .chat-input-bar { background: var(--wa-header-bg); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .chat-input-field { flex: 1; padding: 12px; background: var(--wa-surface); border: none; border-radius: 8px; color: #fff; text-align: right; outline: none; }
        
        .voice-btn, .send-btn { width: 45px; height: 45px; background: var(--wa-surface); border: none; border-radius: 50%; color: var(--wa-green); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .send-btn { background: var(--wa-green); color: #111b21; }
        
        .story-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--wa-header-bg); border-bottom: 1px solid var(--wa-surface); }
        .story-circle { min-width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--wa-green); display: flex; justify-content: center; align-items: center; font-size: 12px; cursor: pointer; background: var(--wa-surface); color: var(--wa-text); text-align: center; }
        
        .reaction-picker { display: none; position: fixed; background: var(--wa-header-bg); border: 1px solid var(--wa-surface); border-radius: 30px; padding: 8px 15px; gap: 12px; z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .reaction-picker span { font-size: 22px; cursor: pointer; }

        .nav-bar { background: var(--wa-header-bg); height: 60px; display: flex; border-top: 1px solid var(--wa-surface); }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--wa-muted); font-size: 14px; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--wa-green); background: #1c282f; }

        #calling-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,20,26,0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .video-box { display: flex; gap: 10px; width: 90%; max-width: 500px; }
        video { width: 50%; background: #000; border-radius: 8px; border: 1px solid var(--wa-green); transform: scaleX(-1); }
        
        #story-view-modal, #settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,20,26,0.95); z-index: 25000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: var(--wa-header-bg); border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--wa-surface); }
    </style>
</head>
<body>

    <div id="story-view-modal" onclick="this.style.display='none'; document.getElementById('story-media-content').innerHTML=''">
        <div id="story-media-content" style="max-width:100%; max-height:70vh;"></div>
    </div>

    <div id="settings-modal">
        <div class="modal-box">
            <h3 style="color:var(--wa-green); margin-bottom:15px;">الإعدادات وصورة البروفايل ⚙️</h3>
            <div style="display:flex; flex-direction:column; align-items:center; gap:15px;">
                <div style="width:90px; height:90px; border-radius:50%; background:#2a3942; overflow:hidden; cursor:pointer; position:relative; border:2px solid var(--wa-green);" onclick="document.getElementById('profile-pic-input').click()">
                    <img id="my-profile-img" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                    <span id="profile-placeholder" style="line-height:90px; font-size:11px; color:var(--wa-muted); display:block;">اضغط لتغيير الصورة</span>
                </div>
                <input type="file" id="profile-pic-input" style="display:none;" accept="image/*" onchange="updateProfilePicture(this)">
                
                <h4 id="settings-user-name"></h4>
                <p id="settings-user-phone" style="color:var(--wa-muted); font-size:14px;"></p>
                
                <div id="qrcode-area" style="background:#fff; padding:10px; border-radius:8px;"></div>
                <button class="login-btn" style="background:#ff3b30; color:#fff; width:100%;" onclick="document.getElementById('settings-modal').style.display='none'">إغلاق</button>
            </div>
        </div>
    </div>

    <div id="calling-screen">
        <h3 style="color:var(--wa-green)" id="call-status-label">مكالمة جارية لايف...</h3>
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <button style="background:#ff3b30; color:#fff; padding:15px 30px; border:none; border-radius:30px; font-weight:bold; cursor:pointer;" onclick="endLiveCall()">إنهاء المكالمة 🚫</button>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--wa-green); margin-bottom:15px;">Nile Chat Pro 🟢</h2>
            <input type="text" id="login-name" class="login-input" placeholder="اسم المستخدم...">
            <input type="tel" id="login-phone" class="login-input" placeholder="رقم الهاتف...">
            <button class="login-btn" onclick="submitLogin()">دخول</button>
        </div>
    </div>

    <div id="phone-wrapper">
        <div class="app-header">
            <span style="color:var(--wa-green); font-weight:bold; font-size:20px;">Nile Chat</span>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="login-btn" style="padding:6px 12px; font-size:12px; background:#202c33; color:var(--wa-green);" onclick="addNewPrivateContact()">+ إضافة جهة اتصال 👤</button>
                <button class="login-btn" style="padding:6px 12px; font-size:12px;" onclick="createNewGroup()">+ جروب جديد</button>
                <i class="fas fa-cog" style="font-size:22px; color:var(--wa-muted); cursor:pointer;" onclick="openSettingsModal()"></i>
            </div>
        </div>

        <div id="screen-chats" class="main-content active">
            <div class="story-container" id="stories-tray">
                <div class="story-circle" onclick="openStoryUploaderMenu()">+ حالة جديدة</div>
            </div>
            <input type="file" id="story-file-input" style="display:none;" onchange="uploadStoryMedia(this)">

            <div class="list-item" onclick="openChatWindow('public_room', 'مجموعة نايل العامة 💬', '')">
                <div class="item-avatar"><i class="fas fa-users"></i></div>
                <div class="item-details">
                    <div class="item-name">مجموعة نايل العامة 💬</div>
                    <div class="item-msg">اكتب @NileAI للرد الفوري من الذكاء الاصطناعي</div>
                </div>
            </div>
            <div id="groups-list-target"></div>
            <div id="custom-private-chats-list"></div>
        </div>

        <div id="screen-ai" class="main-content">
            <div class="list-item" onclick="openChatWindow('NileAI_room', 'مساعد NileAI الشخصي 🤖', '')">
                <div class="item-avatar"><i class="fas fa-robot"></i></div>
                <div class="item-details">
                    <div class="item-name">مساعد NileAI الشخصي 🤖</div>
                    <div class="item-msg">الدردشة المباشرة والسريعة مع الـ AI هنا</div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" id="tab-chats" onclick="switchTab('chats')">الدردشات والمجموعات</div>
            <div class="nav-item" id="tab-ai" onclick="switchTab('ai')">شاشة الـ AI 🤖</div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button style="background:none; border:none; color:var(--wa-green); font-size:20px; margin-left:15px; cursor:pointer;" onclick="closeChatWindow()"><i class="fas fa-arrow-right"></i></button>
            <div class="chat-user-info" style="flex:1;">
                <h4 id="chat-win-name"></h4>
            </div>
            <div id="call-actions" style="display:none; gap:22px; color:var(--wa-green); font-size:20px;">
                <i class="fas fa-phone" style="cursor:pointer;" onclick="startCallEngine('audio')"></i>
                <i class="fas fa-video" style="cursor:pointer;" onclick="startCallEngine('video')"></i>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages-container"></div>
        
        <div class="chat-input-bar">
            <i class="fas fa-paperclip" style="font-size:22px; color:var(--wa-green); cursor:pointer;" onclick="document.getElementById('global-file-input').click()"></i>
            <input type="text" id="chat-input" class="chat-input-field" placeholder="اكتب رسالتك هنا...">
            <button class="voice-btn" id="voice-record-btn" onclick="toggleVoiceRecording()"><i class="fas fa-microphone"></i></button>
            <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <input type="file" id="global-file-input" style="display:none;" onchange="handleGlobalFileSharing(this)">

    <div class="reaction-picker" id="global-reaction-picker">
        <span onclick="applyReaction('❤️')">❤️</span>
        <span onclick="applyReaction('👍')">👍</span>
        <span onclick="applyReaction('😂')">😂</span>
        <span onclick="applyReaction('😮')">😮</span>
        <span onclick="applyReaction('😢')">😢</span>
    </div>

    <script>
        let socket, myName="", myPhone="", currentChatTarget="public_room", currentTargetPhone="";
        let mediaRecorder, audioChunks=[], isRecording=false, localStream, peerConnection;
        let activeReactionMsgId = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        window.onload = function() {
            let savedName = localStorage.getItem('nile_user_name');
            let savedPhone = localStorage.getItem('nile_user_phone');
            let savedPic = localStorage.getItem('my_profile_pic');
            
            if(savedPic) {
                document.getElementById('my-profile-img').src = savedPic;
                document.getElementById('my-profile-img').style.display = 'block';
                document.getElementById('profile-placeholder').style.display = 'none';
            }

            if(savedName && savedPhone) {
                myName = savedName; myPhone = savedPhone;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('phone-wrapper').style.display='flex';
                initSocket();
            }
            loadPrivateChats();
            document.addEventListener('click', () => { document.getElementById('global-reaction-picker').style.display = 'none'; });
        };

        function submitLogin() {
            myName = document.getElementById('login-name').value.trim();
            myPhone = document.getElementById('login-phone').value.trim();
            if(!myName || !myPhone) return alert("الرجاء إدخال بياناتك كاملة!");
            
            localStorage.setItem('nile_user_name', myName);
            localStorage.setItem('nile_user_phone', myPhone);
            
            document.getElementById('login-screen').style.display='none';
            document.getElementById('phone-wrapper').style.display='flex';
            initSocket();
        }

        function initSocket() {
            socket = io(window.location.origin);
            socket.emit('register_user', { phone: myPhone, name: myName });
            socket.emit('get_stories');
            socket.emit('get_groups');

            socket.on('message', (data) => {
                if(data.room === currentChatTarget) {
                    appendBubble(data.sender, data.text, data.id, data.file_type, data.reactions, data.file_name);
                }
            });

            socket.on('chat_history', (data) => {
                document.getElementById('chat-messages-container').innerHTML = "";
                if(data.messages) {
                    data.messages.forEach(m => appendBubble(m.sender, m.text, m.id, m.file_type, m.reactions, m.file_name));
                }
            });

            socket.on('reaction_updated', (data) => {
                let badge = document.getElementById('react-'+data.id);
                if(badge) {
                    badge.innerText = data.reactions;
                    badge.style.display = data.reactions ? 'block' : 'none';
                }
            });

            socket.on('stories_list', (data) => {
                let tray = document.getElementById('stories-tray');
                tray.innerHTML = `<div class="story-circle" onclick="openStoryUploaderMenu()">+ حالة جديدة</div>`;
                data.stories.forEach(s => {
                    let d = document.createElement('div'); d.className = "story-circle";
                    d.innerText = s.sender;
                    d.onclick = () => viewStoryLive(s.sender, s.text, s.file_type);
                    tray.appendChild(d);
                });
            });

            socket.on('new_story_alert', () => socket.emit('get_stories'));
            socket.on('group_created_alert', () => socket.emit('get_groups'));

            socket.on('groups_list', (data) => {
                let target = document.getElementById('groups-list-target');
                target.innerHTML = "";
                data.groups.forEach(g => {
                    target.innerHTML += `
                        <div class="list-item" onclick="openChatWindow('${g.id}', '${g.name}', '')">
                            <div class="item-avatar"><i class="fas fa-users"></i></div>
                            <div class="item-details"><div class="item-name">${g.name}</div><div class="item-msg">جروب عام مشترك</div></div>
                        </div>`;
                });
            });

            socket.on('call_signal', async (data) => {
                try {
                    if (data.type === 'offer') {
                        if (confirm(`مكالمة واردة من ${data.caller_name}. هل تقبل؟`)) {
                            document.getElementById('calling-screen').style.display = 'flex';
                            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: data.media === 'video' });
                            document.getElementById('localVideo').srcObject = localStream;
                            peerConnection = new RTCPeerConnection(rtcConfig);
                            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                            
                            peerConnection.onicecandidate = e => {
                                if(e.candidate) socket.emit('call_signal', { target_phone: data.caller_phone, type: 'candidate', candidate: e.candidate });
                            };
                            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                            
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                            let ans = await peerConnection.createAnswer();
                            await peerConnection.setLocalDescription(ans);
                            socket.emit('call_signal', { target_phone: data.caller_phone, type: 'answer', answer: ans });
                        }
                    } else if (data.type === 'answer') {
                        if(peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    } else if (data.type === 'candidate') {
                        if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } else if (data.type === 'hangup') {
                        endLiveCall(false);
                    }
                } catch(err) { console.log(err); }
            });
        }

        function sendMsg() {
            let field = document.getElementById('chat-input');
            let txt = field.value.trim();
            if(!txt) return;
            
            socket.emit('message', { 
                id: 'msg-'+Date.now(), 
                room: currentChatTarget, 
                sender: myName, 
                phone: myPhone, 
                text: txt, 
                file_type: 'text',
                file_name: ''
            });
            field.value = "";
        }

        // الطريقة الاحترافية والخفيفة لرفع الملفات بدون كسر الاتصال والسيرفر
        function handleGlobalFileSharing(element) {
            let file = element.files[0]; if(!file) return;
            let formData = new FormData();
            formData.append('file', file);

            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.url) {
                    socket.emit('message', { 
                        id: 'msg-'+Date.now(), 
                        room: currentChatTarget, 
                        sender: myName, 
                        phone: myPhone, 
                        text: data.url, 
                        file_type: data.file_type,
                        file_name: file.name
                    });
                }
            }).catch(err => alert("حدث خطأ في رفع الملف"));
            element.value = "";
        }

        function openSettingsModal() {
            document.getElementById('settings-user-name').innerText = myName;
            document.getElementById('settings-user-phone').innerText = "رقمك: " + myPhone;
            let area = document.getElementById('qrcode-area');
            area.innerHTML = "";
            new QRCode(area, { text: myPhone, width: 110, height: 110 });
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function updateProfilePicture(element) {
            let file = element.files[0]; if(!file) return;
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                localStorage.setItem('my_profile_pic', reader.result);
                document.getElementById('my-profile-img').src = reader.result;
                document.getElementById('my-profile-img').style.display = 'block';
                document.getElementById('profile-placeholder').style.display = 'none';
            };
        }

        function addNewPrivateContact() {
            let name = prompt("اكتب اسم جهة الاتصال الجديدة:");
            let phone = prompt("اكتب رقم هاتف جهة الاتصال:");
            if(!name || !phone) return alert("برجاء إدخال البيانات كاملة!");
            
            let chats = JSON.parse(localStorage.getItem('p_chats') || "[]");
            if(!chats.some(c => c.phone === phone)) {
                chats.push({ name: name, phone: phone });
                localStorage.setItem('p_chats', JSON.stringify(chats));
                loadPrivateChats();
            }
        }

        function loadPrivateChats() {
            let target = document.getElementById('custom-private-chats-list');
            if(!target) return; target.innerHTML = "";
            let chats = JSON.parse(localStorage.getItem('p_chats') || "[]");
            chats.forEach(c => {
                let rId = [myPhone, c.phone].sort().join("_");
                target.innerHTML += `
                    <div class="list-item" onclick="openChatWindow('${rId}', '${c.name}', '${c.phone}')">
                        <div class="item-avatar"><i class="fas fa-user"></i></div>
                        <div class="item-details">
                            <div class="item-name">${c.name}</div>
                            <div class="item-msg">محادثة خاصة آمنة</div>
                        </div>
                    </div>`;
            });
        }

        function openStoryUploaderMenu() {
            let choice = prompt("اختر نوع الحالة:\n1. حالة نصية\n2. ميديا من الجهاز");
            if(choice === "1") {
                let txt = prompt("اكتب الحالة:");
                if(txt) socket.emit('add_story', { sender: myName, phone: myPhone, text: txt, file_type: 'text' });
            } else if(choice === "2") {
                document.getElementById('story-file-input').click();
            }
        }

        function uploadStoryMedia(element) {
            let file = element.files[0]; if(!file) return;
            let formData = new FormData();
            formData.append('file', file);

            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.url) {
                    socket.emit('add_story', { sender: myName, phone: myPhone, text: data.url, file_type: data.file_type });
                }
            });
            element.value = "";
        }

        function viewStoryLive(sender, content, type) {
            let modal = document.getElementById('story-view-modal');
            let mediaBox = document.getElementById('story-media-content');
            modal.style.display = 'flex';
            mediaBox.innerHTML = "";
            if(type === 'video') mediaBox.innerHTML = `<video src="${content}" autoplay controls style="max-width:100%; max-height:70vh;"></video>`;
            else if(type === 'image') mediaBox.innerHTML = `<img src="${content}" style="max-width:100%; max-height:70vh;">`;
            else mediaBox.innerHTML = `<div style="font-size:20px; padding:30px; background:#222e35; color:#fff; border-radius:8px;">${content}</div>`;
        }

        async function toggleVoiceRecording() {
            let btn = document.getElementById('voice-record-btn');
            if(!isRecording) {
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        let blob = new Blob(audioChunks, { type: 'audio/ogg' });
                        let formData = new FormData();
                        formData.append('file', blob, 'recording.ogg');

                        fetch('/upload', { method: 'POST', body: formData })
                        .then(res => res.json())
                        .then(data => {
                            if(data.url) {
                                socket.emit('message', { id: 'msg-'+Date.now(), room: currentChatTarget, sender: myName, phone: myPhone, text: data.url, file_type: 'audio', file_name: 'تسجيل صوتي.ogg' });
                            }
                        });
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.style.background = '#ff3b30'; btn.style.color = '#fff';
                } catch(e) { alert("يجب إعطاء صلاحية المايك!"); }
            } else {
                if(mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    btn.style.background = 'var(--wa-surface)'; btn.style.color = 'var(--wa-green)';
                }
            }
        }

        function appendBubble(sender, text, msgId, type, reactions, fileName) {
            let box = document.getElementById('chat-messages-container');
            if(document.getElementById(msgId)) return;
            let b = document.createElement('div');
            b.className = "msg-bubble " + (sender === myName ? 'sent' : 'received');
            b.id = msgId;
            
            b.addEventListener('click', (e) => {
                e.stopPropagation();
                activeReactionMsgId = msgId;
                let picker = document.getElementById('global-reaction-picker');
                picker.style.display = 'flex';
                picker.style.top = e.pageY + 'px'; picker.style.left = e.pageX + 'px';
            });

            let content = text;
            if(type === 'image') content = `<img src="${text}" style="max-width:100%; border-radius:6px; display:block; margin-top:5px;">`;
            else if(type === 'video') content = `<video src="${text}" controls style="max-width:100%; border-radius:6px; display:block; margin-top:5px;"></video>`;
            else if(type === 'audio') content = `<audio src="${text}" controls style="max-width:100%; display:block; margin-top:5px;"></audio>`;
            else if(type === 'file') content = `<div style="padding:10px; background:#111b21; border-radius:6px; margin-top:5px;"><i class="fas fa-file-download" style="color:var(--wa-green); margin-left:8px;"></i><a href="${text}" download="${fileName || 'ملف'}" style="color:#fff; text-decoration:underline;">تحميل الملف: ${fileName || 'مستند'}</a></div>`;

            b.innerHTML = `<strong>${sender}:</strong><div>${content}</div><div class="reaction-badge" id="react-${msgId}" style="display:${reactions?'block':'none'}">${reactions||''}</div>`;
            box.appendChild(b);
            box.scrollTop = box.scrollHeight;
        }

        function applyReaction(emo) {
            if(activeReactionMsgId) {
                socket.emit('add_reaction', { id: activeReactionMsgId, room: currentChatTarget, reaction: emo });
            }
        }

        function createNewGroup() {
            let name = prompt("اكتب اسم الجروب الجديد:");
            if(name) socket.emit('create_group', { name: name });
        }

        async function startCallEngine(type) {
            if(!currentTargetPhone) return;
            try {
                document.getElementById('calling-screen').style.display = 'flex';
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
                document.getElementById('localVideo').srcObject = localStream;
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                
                peerConnection.onicecandidate = e => {
                    if(e.candidate) socket.emit('call_signal', { target_phone: currentTargetPhone, type: 'candidate', candidate: e.candidate });
                };
                peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
                
                let offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call_signal', { target_phone: currentTargetPhone, caller_phone: myPhone, caller_name: myName, type: 'offer', offer: offer, media: type });
            } catch(e) { alert("خطأ في تشغيل الكاميرا/المايك."); }
        }

        function endLiveCall(notifyPartner = true) {
            document.getElementById('calling-screen').style.display = 'none';
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            if(notifyPartner && currentTargetPhone) {
                socket.emit('call_signal', { target_phone: currentTargetPhone, type: 'hangup' });
            }
        }

        function openChatWindow(roomId, roomName, targetPhone) {
            currentChatTarget = roomId; currentTargetPhone = targetPhone;
            document.getElementById('chat-win-name').innerText = roomName;
            document.getElementById('call-actions').style.display = targetPhone ? 'flex' : 'none';
            document.getElementById('chat-window').style.display = 'flex';
            socket.emit('join_room', { room: currentChatTarget });
        }

        function closeChatWindow() { document.getElementById('chat-window').style.display='none'; }
        
        function switchTab(t) {
            document.querySelectorAll('.main-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-'+t).classList.add('active');
            if(t === 'chats') document.getElementById('tab-chats').classList.add('active');
            if(t === 'ai') document.getElementById('tab-ai').classList.add('active');
        }
    </script>
</body>
</html>
