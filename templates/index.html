<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile Chat - نايل شات</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3649/3649421.png" type="image/png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #111b21; color: #e9edef; overflow: hidden; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111b21; display: flex; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        .login-box { background: #222e35; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .login-box h2 { margin-bottom: 20px; color: #00a884; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 6px; background: #2a3942; color: #fff; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #00a884; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #main-layout { display: flex; width: 100%; height: 100%; }
        #sidebar { width: 340px; background: #111b21; border-left: 1px solid #222e35; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 999; }
        .sidebar-header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: #aebac1; }
        .room-controls-buttons { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-bottom: 1px solid #222e35; }
        .add-room-btn { display: flex; align-items: center; width: 100%; padding: 10px; border: none; border-radius: 6px; background: #202c33; color: #e9edef; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; text-align: right; }
        .add-room-btn:hover { background: #2a3942; }
        .rooms-container { flex: 1; overflow-y: auto; padding: 10px; }
        .room-section-title { font-size: 12px; color: #00a884; font-weight: bold; padding: 10px 5px 5px; }
        .room-item { padding: 12px; margin-bottom: 5px; border-radius: 8px; background: #202c33; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .room-item.active { background: #2a3942; border-right: 4px solid #00a884; }
        .sidebar-footer { padding: 15px; background: #202c33; text-align: center; font-size: 10px; color: #8696a0; border-top: 1px solid #222e35; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background: #0b141a; position: relative; }
        header { background: #202c33; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; min-height: 60px; z-index: 10; }
        .header-info { display: flex; align-items: center; gap: 12px; }
        #toggle-sidebar-btn { display: none; background: transparent; border: none; color: #aebac1; font-size: 20px; cursor: pointer; }
        .header-controls { display: flex; gap: 15px; }
        .call-btn { background: #2a3942; border: none; width: 40px; height: 40px; border-radius: 50%; color: #aebac1; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message { max-width: 65%; padding: 10px 14px; border-radius: 8px; font-size: 15px; position: relative; display: flex; flex-direction: column; }
        .message.sent { background: #005c4b; align-self: flex-start; border-top-left-radius: 0; }
        .message.received { background: #202c33; align-self: flex-end; border-top-right-radius: 0; }
        .sender-tag { font-size: 12px; font-weight: bold; color: #00a884; margin-bottom: 4px; }
        .forwarded-tag { font-size: 11px; color: #8696a0; font-style: italic; margin-bottom: 2px; }
        .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 5px; font-size: 11px; color: #8696a0; margin-top: 4px; }
        .ticks-blue { color: #53bdeb; }
        .msg-actions { position: absolute; left: -45px; top: 5px; display: none; gap: 4px; background: #222e35; padding: 4px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .message:hover .msg-actions { display: flex; }
        .action-icon { cursor: pointer; color: #aebac1; font-size: 13px; padding: 2px; }
        .action-icon:hover { color: #fff; }
        .reply-preview-box { background: rgba(0,0,0,0.2); border-right: 3px solid #00a884; padding: 5px; border-radius: 4px; margin-bottom: 5px; font-size: 13px; }
        #chat-footer { background: #202c33; padding: 10px 15px; display: none; flex-direction: column; gap: 5px; }
        #reply-bar { display: none; justify-content: space-between; align-items: center; background: #2a3942; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
        .input-area { display: flex; align-items: center; gap: 10px; width: 100%; }
        .media-btn { background: transparent; border: none; color: #aebac1; font-size: 22px; cursor: pointer; }
        #message-input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #2a3942; color: #fff; font-size: 15px; outline: none; }
        #emoji-picker { position: absolute; bottom: 70px; right: 20px; background: #222e35; border: 1px solid #2a3942; border-radius: 8px; padding: 10px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 1000; }
        #emoji-picker span { font-size: 20px; cursor: pointer; }
        #qr-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:20000; }
        .qr-content { background:#222e35; padding:25px; border-radius:12px; text-align:center; position:relative; }
        #call-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17,27,33,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30000; display: none; }
        .video-grid { display: flex; gap: 20px; margin-bottom: 30px; width: 90%; justify-content: center; }
        video { width: 45%; background: #000; border-radius: 12px; transform: scaleX(-1); }
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            body.sidebar-hidden #sidebar { transform: translateX(0); }
            #toggle-sidebar-btn { display: block; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="sidebar-hidden">

    <div id="login-screen">
        <div class="login-box">
            <h2>Nile Chat - تسجيل الدخول</h2>
            <input type="text" id="login-name" placeholder="إسم المستخدم">
            <div style="display:flex; gap:5px;">
                <select id="login-country" style="flex: 1;">
                    <option value="+20">مصر (+20)</option>
                    <option value="+966">السعودية (+966)</option>
                </select>
                <input type="tel" id="login-phone" placeholder="رقم الهاتف" style="flex: 2;">
            </div>
            <button class="login-btn" onclick="submitLogin()">دخول المنصة</button>
        </div>
    </div>

    <div id="main-layout">
        <div id="sidebar">
            <div class="sidebar-header">
                <span><i class="fa-solid fa-sliders"></i> إدارة المحادثات</span>
                <button onclick="toggleQRModal()" class="add-room-btn" style="width:auto;"><i class="fa-solid fa-qrcode"></i></button>
            </div>
            
            <div class="room-controls-buttons">
                <button class="add-room-btn" onclick="createNewRoom('public')"><i class="fa-solid fa-earth-africa" style="margin-left:8px;"></i> جروب عام</button>
                <button class="add-room-btn" style="background:#721c24;" onclick="createNewRoom('private')"><i class="fa-solid fa-lock" style="margin-left:8px;"></i> جروب سري</button>
                <button class="add-room-btn" style="background:#005c4b;" onclick="createNewSecretDM()"><i class="fa-solid fa-user-shield" style="margin-left:8px;"></i> شات مباشر بالرقم</button>
                <button class="add-room-btn" style="background:#8a2be2;" onclick="startPrivateAIChat()"><i class="fa-solid fa-robot" style="margin-left:8px;"></i> ذكاء نايل الاصطناعي</button>
            </div>

            <div class="rooms-container">
                <div class="room-section-title"><i class="fa-solid fa-users"></i> المجموعات</div>
                <div id="server-rooms"></div>
                <div class="room-section-title"><i class="fa-solid fa-user-lock"></i> شات سري مباشر</div>
                <div id="private-rooms"></div>
            </div>
            <div class="sidebar-footer">Created by Abdullah Mohamed Shaban Mohanna</div>
        </div>

        <div id="chat-container">
            <header>
                <div class="header-info">
                    <button id="toggle-sidebar-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <h3 id="chat-header-title">إختر غرفة لبدء الشات</h3>
                </div>
                <div class="header-controls" id="call-actions" style="display: none;">
                    <button class="call-btn" onclick="startCall('audio')"><i class="fa-solid fa-phone"></i></button>
                    <button class="call-btn" onclick="startCall('video')"><i class="fa-solid fa-video"></i></button>
                </div>
            </header>

            <div id="chat-window"></div>

            <div id="emoji-picker">
                <span onclick="addEmoji('😀')">😀</span><span onclick="addEmoji('😂')">😂</span>
                <span onclick="addEmoji('❤️')">❤️</span><span onclick="addEmoji('👍')">👍</span>
                <span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('🚀')">🚀</span>
            </div>

            <div id="chat-footer">
                <div id="reply-bar">
                    <span id="reply-bar-text" style="color:#00a884; font-weight:bold;"></span>
                    <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="cancelReply()"></i>
                </div>
                <div class="input-area">
                    <button id="emoji-button" class="media-btn" onclick="toggleEmojiPicker()">😀</button>
                    <button class="media-btn" onclick="document.getElementById('media-input').click()"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="file" id="media-input" style="display:none;" accept="image/*,video/*" onchange="handleMediaUpload(this)">
                    <input type="text" id="message-input" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="media-btn" style="color:#00a884;" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-content">
            <span style="position:absolute; top:10px; left:10px; cursor:pointer;" onclick="toggleQRModal()">&times;</span>
            <h3 style="color:#fff; margin-bottom:15px;">رابط المنصة</h3>
            <div class="qr-content">
            <span style="position:absolute; top:10px; left:10px; cursor:pointer;" onclick="toggleQRModal()">&times;</span>
            <h3 style="color:#fff; margin-bottom:15px;">رابط المنصة</h3>
            <div id="qr-container"></div>
        </div>
    </div>

    <div id="call-screen">
        <div class="video-grid">
            <video id="local-video" autoplay playsinline muted></video>
            <video id="remote-video" autoplay playsinline></video>
        </div>
        <button style="background:#ea0038; color:white; border:none; padding:12px 30px; border-radius:30px; font-weight:bold; cursor:pointer;" onclick="endCall()">إنهاء المكالمة</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myPhone = "", currentRoom = "", selectedReplyId = "";
        let localStream, peerConnection;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        window.onload = function() {
            const savedName = localStorage.getItem('myName');
            const savedPhone = localStorage.getItem('myPhone');
            if(savedName && savedPhone) {
                document.getElementById('login-screen').style.display = 'none';
                myName = savedName; myPhone = savedPhone;
                initChat();
            }
        };

        function initChat() {
            socket.emit('get_all_rooms', { phone: myPhone });
            renderSecretDMs();
        }

        function toggleSidebar() { document.body.classList.toggle('sidebar-hidden'); }

        function submitLogin() {
            const name = document.getElementById('login-name').value.trim();
            const phoneCode = document.getElementById('login-country').value;
            const phoneNum = document.getElementById('login-phone').value.trim();
            if(!name || !phoneNum) return alert("املاً البيانات!");
            myName = name; myPhone = phoneCode + phoneNum;
            localStorage.setItem('myName', myName);
            localStorage.setItem('myPhone', myPhone);
            document.getElementById('login-screen').style.display = 'none';
            initChat();
        }

        function createNewRoom(type) {
            const name = prompt("اسم المجموعة:");
            if(!name) return;
            let pass = type === 'private' ? prompt("رقم المرور:") : "";
            socket.emit('create_new_room_server', { name: name, type: type, password: pass, phone: myPhone });
        }

        function createNewSecretDM() {
            const target = prompt("رقم الهاتف للطرف الآخر:");
            if(!target) return;
            let list = JSON.parse(localStorage.getItem(`dms_${myPhone}`) || "[]");
            if(!list.includes(target)) { list.push(target); localStorage.setItem(`dms_${myPhone}`, JSON.stringify(list)); }
            renderSecretDMs();
        }

        function renderSecretDMs() {
            const container = document.getElementById('private-rooms'); container.innerHTML = '';
            let list = JSON.parse(localStorage.getItem(`dms_${myPhone}`) || "[]");
            list.forEach(phone => {
                const sorted = [myPhone, phone].sort();
                const roomName = `${sorted[0]}-${sorted[1]}`;
                const div = document.createElement('div');
                div.className = `room-item ${currentRoom === roomName ? 'active' : ''}`;
                div.innerHTML = `<span><i class="fa-solid fa-user-secret"></i> ${phone}</span>`;
                div.onclick = () => selectRoom(roomName, 'private_dm', phone);
                container.appendChild(div);
            });
        }

        socket.on('receive_rooms_list', function(rooms) {
            const container = document.getElementById('server-rooms'); container.innerHTML = '';
            rooms.forEach(r => {
                const div = document.createElement('div');
                div.className = `room-item ${currentRoom === r.name ? 'active' : ''}`;
                div.innerHTML = `<span><i class="fa-solid ${r.type === 'public' ? 'fa-earth-africa' : 'fa-lock'}"></i> ${r.name}</span>`;
                div.onclick = () => {
                    let pass = r.type === 'private' ? prompt("أدخل رقم المرور:") : "";
                    selectRoom(r.name, r.type, pass);
                };
                container.appendChild(div);
            });
        });

        function selectRoom(room, type, extra) {
            currentRoom = room;
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('chat-footer').style.display = 'flex';
            document.getElementById('call-actions').style.display = type === 'private_dm' ? 'flex' : 'none';
            document.getElementById('chat-header-title').innerText = room;
            socket.emit('join_room', { room: room, password: extra, phone: myPhone });
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function startPrivateAIChat() {
            const aiRoom = `AI-Chat-${myPhone}`; currentRoom = aiRoom;
            document.getElementById('chat-footer').style.display = 'flex';
            document.getElementById('call-actions').style.display = 'none';
            document.getElementById('chat-header-title').innerText = "🤖 ذكاء نايل الاصطناعي (NileAI)";
            document.getElementById('chat-window').innerHTML = ``;
            socket.emit('join_room', { room: aiRoom, phone: myPhone });
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const txt = input.value.trim(); if(!txt) return;
            socket.emit('new_message', {
                id: 'msg-'+Date.now(), room: currentRoom, sender: myName, phone: myPhone, content: txt, type: 'text', reply_to: selectedReplyId
            });
            input.value = ''; cancelReply();
        }

        function handleMediaUpload(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                socket.emit('new_message', {
                    id: 'msg-'+Date.now(), room: currentRoom, sender: myName, phone: myPhone, content: e.target.result, type: file.type.startsWith('image/') ? 'image' : 'video', reply_to: selectedReplyId
                });
                cancelReply();
            };
            reader.readAsDataURL(file);
        }

        socket.on('message', function(data) {
            if(data.room !== currentRoom) return;
            const win = document.getElementById('chat-window');
            const isSent = data.phone === myPhone;
            
            if(document.getElementById(data.id)) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            msgDiv.id = data.id;
            
            let html = '';
            if(data.is_forwarded) html += `<span class="forwarded-tag"><i class="fa-solid fa-share"></i> رسالة محولة</span>`;
            if(data.reply_to) html += `<div class="reply-preview-box"><i class="fa-solid fa-reply"></i> رداً على رسالة</div>`;
            
            html += `<span class="sender-tag">${data.sender}</span>`;
            if(data.type === 'image') html += `<img src="${data.content}" style="max-width:100%; border-radius:6px;">`;
            else if(data.type === 'video') html += `<video src="${data.content}" controls style="max-width:100%;"></video>`;
            else html += `<span>${data.content}</span>`;
            
            const tickClass = data.is_read ? 'ticks-blue' : '';
            const ticksHtml = isSent ? `<i class="fa-solid fa-check-double ${tickClass}" style="margin-right:5px;"></i>` : '';
            
            const timeStr = new Date(data.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            html += `<div class="msg-meta"><span>${timeStr}</span> ${ticksHtml}</div>`;
            
            html += `<div class="msg-actions">
                <i class="fa-solid fa-reply action-icon" onclick="setReply('${data.id}', '${data.content}')" title="رد"></i>
                <i class="fa-solid fa-share action-icon" onclick="forwardMessage('${data.content}', '${data.type}')" title="تحويل"></i>`;
            if(isSent) {
                html += `
                <i class="fa-solid fa-trash action-icon" onclick="deleteMessage('${data.id}')" title="حذف"></i>
                <i class="fa-solid fa-pen action-icon" onclick="editMessage('${data.id}', '${data.content}')" title="تعديل"></i>`;
            }
            html += `</div>`;
            
            msgDiv.innerHTML = html; win.appendChild(msgDiv); win.scrollTop = win.scrollHeight;
            if(!isSent) socket.emit('mark_as_read', { room: currentRoom, phone: myPhone });
        });

        function setReply(id, text) { selectedReplyId = id; document.getElementById('reply-bar').style.display = 'flex'; document.getElementById('reply-bar-text').innerText = "رد على: " + text.substring(0,20); }
        function cancelReply() { selectedReplyId = ""; document.getElementById('reply-bar').style.display = 'none'; }
        
        function forwardMessage(content, type) {
            const targetRoom = prompt("أدخل اسم المجموعة الفعلي أو رقم الهاتف متضمناً كود الدولة (مثال: +201xxx) لتحويل الرسالة:");
            if(!targetRoom) return;
            socket.emit('new_message', {
                id: 'msg-'+Date.now(), room: targetRoom, sender: myName, phone: myPhone, content: content, type: type, is_forwarded: 1
            });
            alert("تم تحويل الرسالة!");
        }

        function deleteMessage(id) { if(confirm("حذف الرسالة نهائياً من الطرفين؟")) socket.emit('delete_message_server', { id: id, room: currentRoom }); }
        function editMessage(id, old) { const n = prompt("تعديل نص الرسالة:", old); if(n) socket.emit('edit_message_server', { id: id, room: currentRoom, content: n }); }

        socket.on('delete_message_client', data => document.getElementById(data.id)?.remove());
        socket.on('edit_message_client', data => { const el = document.getElementById(data.id)?.querySelector('span:not(.sender-tag)'); if(el) el.innerText = data.content + " (معدلة)"; });
        socket.on('messages_read_update', () => { document.querySelectorAll('.message.sent .fa-check-double').forEach(el => el.classList.add('ticks-blue')); });

        function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; }
        function addEmoji(em) { document.getElementById('message-input').value += em; toggleEmojiPicker(); }
        function toggleQRModal() { const m = document.getElementById('qr-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; if(m.style.display === 'flex') { document.getElementById('qr-container').innerHTML=''; new QRCode(document.getElementById('qr-container'), {text: window.location.href, width:140, height:140}); } }

        async function startCall(type) {
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
            document.getElementById('local-video').srcObject = localStream;
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { room: currentRoom, candidate: e.candidate });
            peerConnection.ontrack = e => document.getElementById('remote-video').srcObject = e.streams[0];
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans);
            socket.emit('answer_call', { room: currentRoom, answer: ans });
        });
        socket.on('call_answered', data => peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)));
        socket.on('ice_candidate', data => peerConnection && peerConnection.addIceCandidate(new RTCIceCandidate(data)));
        socket.on('end_call', () => { document.getElementById('call-screen').style.display = 'none'; if(localStream) localStream.getTracks().forEach(t => t.stop()); if(peerConnection) peerConnection.close(); });
        function endCall() { socket.emit('end_call', { room: currentRoom }); }
    </script>
</body>
</html>
