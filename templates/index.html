<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نايل شات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="نايل شات">
    
    <style>
        :root {
            --neon-green: #00ffcc;
            --neon-blue: #0077ff;
            --dark-bg: #0b0f19;
            --panel-bg: #131a2a;
            --text-color: #f5f7fa;
            --text-muted: #8b9bb4;
            --border-color: #1e293b;
            --chat-bubble-me: #004b49;
            --chat-bubble-them: #1e2538;
        }

        .light-mode {
            --neon-green: #00a884;
            --neon-blue: #0055cc;
            --dark-bg: #f0f2f5;
            --panel-bg: #ffffff;
            --text-color: #111b21;
            --text-muted: #667781;
            --border-color: #e9edef;
            --chat-bubble-me: #d9fdd3;
            --chat-bubble-them: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #login-overlay { position: fixed; inset: 0; background: var(--dark-bg); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--panel-bg); padding: 30px; border-radius: 16px; border: 2px solid var(--neon-green); width: 100%; max-width: 420px; box-shadow: 0 0 25px rgba(0,255,204,0.2); text-align: center; }
        .login-box h2 { color: var(--neon-green); margin-bottom: 20px; }
        .login-box input, .login-box select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--dark-bg); color: var(--text-color); font-size: 16px; outline: none; text-align: center; position: relative; z-index: 10002; }
        .login-box button { width: 100%; padding: 14px; border: none; background: var(--neon-green); color: #000; font-weight: bold; font-size: 16px; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,204,0.3); position: relative; z-index: 10002; }

        #app-container { display: flex; width: 100%; height: 100vh; position: relative; }
        
        .sidebar { width: 30%; min-width: 340px; background: var(--panel-bg); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.15); }
        .sidebar-header img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon-green); cursor: pointer; }
        
        .nav-tabs { display: flex; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 14px 5px; text-align: center; background: none; border: none; color: var(--text-muted); font-size: 14px; font-weight: bold; cursor: pointer; position: relative; transition: 0.2s; z-index: 12; }
        .tab-btn.active { color: var(--neon-green); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .list-container.active { display: block; }
        
        .chat-item { display: flex; align-items: center; padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative; z-index: 15; }
        .chat-item:hover, .chat-item.active { background: rgba(255,255,255,0.05); border-color: var(--border-color); }
        .chat-item img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-left: 12px; border: 1px solid var(--border-color); }
        .chat-item .info { flex: 1; overflow: hidden; }
        .chat-item .info h4 { font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .info p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .feed-post-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .feed-header { display: flex; align-items: center; margin-bottom: 10px; }
        .feed-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-left: 10px; }
        .feed-body p { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .feed-body img, .feed-body video { width: 100%; max-height: 250px; border-radius: 8px; object-fit: cover; margin-bottom: 10px; border: 1px solid var(--border-color); }

        .main-window { flex: 1; display: flex; flex-direction: column; background: var(--dark-bg); position: relative; z-index: 1; }
        
        .chat-messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-size: cover; background-position: center; }
        
        .msg-row { display: flex; width: 100%; margin-bottom: 4px; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.them { justify-content: flex-start; }
        .msg-box { max-width: 65%; padding: 10px 14px; border-radius: 14px; position: relative; font-size: 15px; line-height: 1.4; color: var(--text-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-row.me .msg-box { background: var(--chat-bubble-me); border-top-left-radius: 4px; text-align: right; }
        .msg-row.them .msg-box { background: var(--chat-bubble-them); border-top-right-radius: 4px; text-align: left; }
        
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .msg-actions { display: none; position: absolute; top: -25px; left: 10px; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 2px 5px; gap: 8px; z-index: 100; }
        .msg-box:hover .msg-actions { display: flex; }
        .msg-actions span { cursor: pointer; font-size: 12px; color: var(--text-muted); }
        .msg-actions span:hover { color: var(--neon-green); }
        
        .reply-preview-box { background: rgba(0,0,0,0.2); border-right: 3px solid var(--neon-green); padding: 5px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; color: var(--text-muted); text-align: right; }

        .chat-footer { padding: 12px 15px; background: var(--panel-bg); border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; position: relative; z-index: 20; }
        .chat-footer input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid var(--border-color); background: var(--dark-bg); color: var(--text-color); font-size: 15px; outline: none; }
        .chat-footer button, .chat-footer label { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .chat-footer button:hover, .chat-footer label:hover { color: var(--neon-green); }

        #call-screen { position: fixed; inset: 0; background: #080d16; z-index: 12000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; }
        .call-user-info { text-align: center; margin-top: 40px; }
        .call-user-info img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--neon-green); margin-bottom: 15px; animation: pulse 2s infinite; }
        .video-container-frame { width: 100%; max-width: 500px; height: 320px; background: #000; border-radius: 16px; border: 2px solid var(--border-color); position: relative; overflow: hidden; margin: 20px 0; }
        .video-stream-box { width: 100%; height: 100%; object-fit: cover; }
        .local-mini-preview { width: 110px; height: 150px; background: #111; position: absolute; bottom: 10px; left: 10px; border-radius: 8px; border: 1px solid var(--neon-green); object-fit: cover; }
        .call-controls { display: flex; gap: 20px; margin-bottom: 4px; }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: #fff; }
        .call-btn.hangup { background: #ff3b30; }
        .call-btn.answer { background: #34c759; }

        .modal-view { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 15000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content-box { background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 16px; padding: 25px; width: 100%; max-width: 480px; position: relative; }

        #dino-game-wrapper { text-align: center; background: #000; color: #fff; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
        #dino-canvas { background: #222; display: block; margin: 10px auto; border: 1px solid var(--neon-green); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,204,0.4); } 70% { box-shadow: 0 0 0 15px rgba(0,255,204,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,204,0); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>نايل شات</h2>
            <input type="text" id="login-phone" placeholder="رقم الهاتف" required>
            <input type="text" id="login-name" placeholder="الاسم" required>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني (اختياري)">
            <button id="btn-submit-login" onclick="initiateNileSession()">دخول</button>
        </div>
    </div>

    <div id="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <img id="user-avatar-current" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" onclick="triggerSettingsDashboard()">
                <h3 style="font-size: 16px; color: var(--neon-green);" id="display-profile-name">نايل شات</h3>
                <div style="display: flex; gap: 10px;">
                    <span style="cursor: pointer; font-size: 18px; z-index: 20;" onclick="triggerVoiceNavigator()">🎙️</span>
                    <span style="cursor: pointer; font-size: 18px; z-index: 20;" onclick="openCreatorDialog()">➕</span>
                </div>
            </div>

            <div class="nav-tabs">
                <div class="tab-btn active" onclick="switchSidebarTab('chats-tab-panel', this)">شات</div>
                <div class="tab-btn" onclick="switchSidebarTab('groups-tab-panel', this)">مجموعات</div>
                <div class="tab-btn" onclick="switchSidebarTab('stories-tab-panel', this)">الحالات</div>
                <div class="tab-btn" onclick="switchSidebarTab('feed-tab-panel', this)">اليوميات</div>
            </div>

            <div id="chats-tab-panel" class="list-container active">
                <div class="chat-item" onclick="activateDirectChat('public_room', 'نايل شات', 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150')">
                    <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150">
                    <div class="info">
                        <h4>نايل شات</h4>
                        <p>المحادثة العامة...</p>
                    </div>
                </div>
                <div class="chat-item" id="ai-chat-item-trigger">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150">
                    <div class="info">
                        <h4>الذكاء الاصطناعي</h4>
                        <p>مساعد الشات الذكي...</p>
                    </div>
                </div>
                <div class="chat-item" id="self-chat-item-trigger">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150">
                    <div class="info">
                        <h4>الرسائل المحفوظة</h4>
                        <p>احفظ ملاحظاتك هنا...</p>
                    </div>
                </div>
                <div style="padding: 10px; border-bottom: 1px solid var(--border-color); position: relative; z-index: 30;">
                    <input type="text" id="phone-search-input" placeholder="ابحث برقم الهاتف..." oninput="searchUserByPhoneNumber()" style="width:100%; padding:8px; border-radius:6px; border:1px solid var(--border-color); background:var(--dark-bg); color:#fff; text-align:center;">
                </div>
                <div id="dynamic-search-results-holder"></div>
                <div id="active-contacts-list"></div>
            </div>

            <div id="groups-tab-panel" class="list-container">
                <div id="units-list-wrapper"></div>
            </div>

            <div id="stories-tab-panel" class="list-container">
                <button onclick="triggerNewStoryCreation()" style="width:100%; padding:10px; background:var(--neon-blue); border:none; border-radius:6px; color:#fff; font-weight:bold; margin-bottom:12px; cursor:pointer; position: relative; z-index: 25;">إضافة حالة</button>
                <div id="stories-list-wrapper"></div>
            </div>

            <div id="feed-tab-panel" class="list-container">
                <button onclick="openNewPostDialog()" style="width:100%; padding:10px; background:var(--neon-green); color:#000; border:none; border-radius:6px; font-weight:bold; margin-bottom:12px; cursor:pointer; position: relative; z-index: 25;">كتابة منشور</button>
                <div id="feed-posts-wrapper"></div>
            </div>
        </div>

        <div class="main-window">
            <div class="sidebar-header" style="border-bottom: 1px solid var(--border-color); background: var(--panel-bg); position: relative; z-index: 20;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img id="active-chat-avatar" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150" style="width:40px; height:40px;">
                    <div>
                        <h4 id="active-chat-title">نايل شات</h4>
                        <span style="font-size:11px; color:var(--neon-green);" id="encryption-indicator-text">اتصال آمن</span>
                    </div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <span style="cursor: pointer; font-size: 20px;" onclick="initiateWebRTCCall('audio')">📞</span>
                    <span style="cursor: pointer; font-size: 20px;" onclick="initiateWebRTCCall('video')">📹</span>
                </div>
            </div>

            <div class="chat-messages-area" id="chat-messages-box"></div>

            <div id="reply-context-footer-container" style="display:none; background:rgba(0,0,0,0.1); padding:8px 15px; border-top:1px solid var(--border-color); justify-content:space-between; align-items:center; position: relative; z-index: 20;">
                <div id="reply-context-footer-text" style="font-size:13px; color:var(--text-muted);"></div>
                <span style="cursor:pointer; color:red;" onclick="cancelReplyContext()">✖</span>
            </div>

            <div class="chat-footer">
                <span style="cursor:pointer; font-size:22px;" onclick="toggleEmojiTray()">😊</span>
                <label for="chat-file-uploader">📎</label>
                <input type="file" id="chat-file-uploader" style="display:none;" onchange="handleFileTransmission(this)">
                
                <span id="voice-record-mic-btn" style="cursor:pointer; font-size:22px;" onclick="toggleVoiceRecording()">🎙️</span>

                <input type="text" id="chat-message-input-field" placeholder="اكتب رسالة..." onkeydown="if(event.key === 'Enter') sendTextMessageToServer()">
                <button onclick="sendTextMessageToServer()">🚀</button>
            </div>
            
            <div id="emoji-tray-popover" style="display:none; position:absolute; bottom:65px; left:20px; background:var(--panel-bg); border:1px solid var(--border-color); border-radius:12px; padding:10px; width:280px; grid-template-columns: repeat(7, 1fr); gap:6px; z-index:20000;"></div>
        </div>
    </div>

    <div id="call-screen">
        <div class="call-user-info">
            <img id="call-screen-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150">
            <h2 id="call-screen-name">مكالمة جارية...</h2>
            <p id="call-status-label" style="color:var(--neon-green); margin-top:5px;">متصل</p>
            
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                <select id="voice-changer-selector" onchange="applyVoiceFilterConfig()" style="padding:6px; border-radius:4px; background:#222; color:#fff; border:1px solid var(--neon-green); position: relative; z-index: 13000;">
                    <option value="none">صوت طبيعي</option>
                    <option value="girl">صوت فتاة</option>
                    <option value="boy">صوت ولد</option>
                    <option value="announcer">صوت مذيع</option>
                </select>
            </div>
        </div>

        <div class="video-container-frame" id="video-frame-block" style="display:none;">
            <video class="video-stream-box" id="remote-video-stream-el" autoplay playsinline></video>
            <video class="local-mini-preview" id="local-video-stream-el" autoplay playsinline muted></video>
            
            <div style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); padding:5px; border-radius:4px; z-index: 13000;">
                <select id="ar-face-filter" style="font-size:11px; background:#000; color:#fff; border:none;" onchange="alert('تم تفعيل الفلتر')">
                    <option value="none">فلاتر الوجه</option>
                    <option value="neon-glasses">نظارات نيون</option>
                    <option value="cyber-punk">قناع سايبر</option>
                </select>
            </div>
        </div>

        <div class="call-controls">
            <button class="call-btn answer" id="btn-answer-call" onclick="acceptIncomingCallSignal()">📞</button>
            <button class="call-btn hangup" onclick="terminateActiveCallPipeline()">✖</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-view">
        <div class="modal-content-box">
            <h3 style="color:var(--neon-green); margin-bottom:15px;">الإعدادات</h3>
            
            <label style="display:block; margin:10px 0 5px; font-size:13px;">تغيير الاسم:</label>
            <input type="text" id="settings-name-input">

            <label style="display:block; margin:10px 0 5px; font-size:13px;">رابط الصورة الشخصية:</label>
            <input type="text" id="settings-avatar-input">

            <label style="display:block; margin:10px 0 5px; font-size:13px;">الحالة المخصصة:</label>
            <input type="text" id="settings-status-text-input">

            <label style="display:block; margin:10px 0 5px; font-size:13px;">نغمة الرينق:</label>
            <select id="settings-ringtone-select" style="width:100%; padding:10px; background:var(--dark-bg); color:#fff; border-radius:6px; margin-bottom:10px;">
                <option value="default.mp3">النغمة الافتراضية</option>
            </select>

            <label style="display:block; margin:10px 0 5px; font-size:13px;">خلفية الشات المخصصة:</label>
            <input type="text" id="settings-wallpaper-input" placeholder="رابط الصورة">

            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
                <span>المظهر:</span>
                <button onclick="toggleThemeMode()" style="padding:6px 12px; background:var(--neon-blue); border:none; border-radius:4px; color:#fff; cursor:pointer;">تغيير المظهر 🌗</button>
            </div>

            <button onclick="toggleArcadeGameView()" style="width:100%; padding:10px; background:rgba(255,165,0,0.2); border:1px solid orange; border-radius:6px; color:orange; margin-bottom:15px; font-weight:bold; cursor:pointer;">تشغيل اللعبة الترفيهية</button>
            
            <div id="dino-game-wrapper">
                <p>اضغط المسافة للقفز 🌵</p>
                <canvas id="dino-canvas" width="400" height="150"></canvas>
            </div>

            <button onclick="saveProfileSettingsLive()" style="width:100%; padding:12px; background:var(--neon-green); border:none; border-radius:6px; font-weight:bold; color:#000; cursor:pointer; margin-top:10px;">حفظ التغييرات</button>
            <span style="position:absolute; top:15px; left:15px; cursor:pointer; font-size:18px;" onclick="closeSettingsDashboard()">✖</span>
        </div>
    </div>

    <div id="creator-modal" class="modal-view">
        <div class="modal-content-box">
            <h3 style="color:var(--neon-green); margin-bottom:15px;" id="creator-modal-title">إضافة جديدة</h3>
            <input type="text" id="creator-name-input" placeholder="الاسم...">
            <select id="creator-type-select" style="width:100%; padding:12px; background:var(--dark-bg); color:#fff; border-radius:6px; margin-bottom:15px;">
                <option value="group">مجموعة</option>
                <option value="channel">قناة</option>
            </select>
            <button onclick="executeUnitCreation()" style="width:100%; padding:12px; background:var(--neon-green); color:#000; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">إنشاء</button>
            <span style="position:absolute; top:15px; left:15px; cursor:pointer; font-size:18px;" onclick="document.getElementById('creator-modal').style.display='none'">✖</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.7.2/socketio.min.js"></script>
    <script>
        let socket = io();
        let currentUser = { phone: '', name: '', avatar: '', email: '', wallpaper: '' };
        let activeRoom = 'public_room';
        let replyContextId = '';
        let globalProfilesCache = {};
        let isRecordingVoice = false;
        let localStream = null;

        window.addEventListener('DOMContentLoaded', () => {
            let saved = localStorage.getItem('nile_chat_session');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('login-overlay').style.display = 'none';
                bootNileChatCoreEngine();
            }
        });

        function initiateNileSession() {
            let phone = document.getElementById('login-phone').value.trim();
            let name = document.getElementById('login-name').value.trim();
            let email = document.getElementById('login-email').value.trim();
            if (!phone || !name) { alert('الرجاء كتابة رقم الهاتف والاسم أولاً!'); return; }
            
            currentUser.phone = phone;
            currentUser.name = name;
            currentUser.email = email;
            currentUser.avatar = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150";
            
            localStorage.setItem('nile_chat_session', JSON.stringify(currentUser));
            document.getElementById('login-overlay').style.display = 'none';
            bootNileChatCoreEngine();
        }

        function bootNileChatCoreEngine() {
            document.getElementById('display-profile-name').innerText = currentUser.name;
            if(currentUser.avatar) document.getElementById('user-avatar-current').src = currentUser.avatar;
            
            socket.emit('register_user', currentUser);
            
            document.getElementById('ai-chat-item-trigger').onclick = () => activateDirectChat(`AI_${currentUser.phone}`, 'الذكاء الاصطناعي', 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150');
            document.getElementById('self-chat-item-trigger').onclick = () => activateDirectChat(`self_${currentUser.phone}`, 'الرسائل المحفوظة', 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150');
            
            socket.emit('join_room', { room: activeRoom });
            socket.emit('get_stories');
            socket.emit('get_units');
            socket.emit('get_feed_posts');
            
            buildEmojiTrayMatrix();
        }

        function switchSidebarTab(panelId, btnEl) {
            document.querySelectorAll('.list-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            btnEl.classList.add('active');
        }

        function activateDirectChat(roomId, roomTitle, avatarUrl) {
            activeRoom = roomId;
            document.getElementById('active-chat-title').innerText = roomTitle;
            document.getElementById('active-chat-avatar').src = avatarUrl;
            document.getElementById('chat-messages-box').innerHTML = '';
            socket.emit('join_room', { room: activeRoom });
        }

        function sendTextMessageToServer() {
            let input = document.getElementById('chat-message-input-field');
            let txt = input.value.trim();
            if (!txt) return;
            
            let payload = {
                id: `msg-${Date.now()}`,
                room: activeRoom,
                sender: currentUser.name,
                phone: currentUser.phone,
                text: txt,
                file_type: 'text',
                file_name: '',
                reply_to: replyContextId
            };
            socket.emit('message', payload);
            input.value = '';
            cancelReplyContext();
        }

        function handleFileTransmission(inputEl) {
            if(!inputEl.files || !inputEl.files[0]) return;
            let file = inputEl.files[0];
            let formData = new FormData();
            formData.append('file', file);
            
            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.url) {
                    let payload = {
                        id: `msg-${Date.now()}`,
                        room: activeRoom,
                        sender: currentUser.name,
                        phone: currentUser.phone,
                        text: data.url,
                        file_type: data.file_type,
                        file_name: data.name,
                        reply_to: replyContextId
                    };
                    socket.emit('message', payload);
                    cancelReplyContext();
                }
            }).catch(err => alert('خطأ أثناء رفع الملف'));
        }

        function toggleVoiceRecording() {
            let btn = document.getElementById('voice-record-mic-btn');
            if(!isRecordingVoice) {
                isRecordingVoice = true;
                btn.innerText = '🛑';
                btn.style.color = 'red';
            } else {
                isRecordingVoice = false;
                btn.innerText = '🎙️';
                btn.style.color = 'var(--text-muted)';
                let mockAudioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
                let payload = {
                    id: `msg-${Date.now()}`,
                    room: activeRoom,
                    sender: currentUser.name,
                    phone: currentUser.phone,
                    text: mockAudioUrl,
                    file_type: 'audio',
                    file_name: 'صوت.mp3',
                    reply_to: replyContextId
                };
                socket.emit('message', payload);
                cancelReplyContext();
            }
        }

        socket.on('message', (msg) => {
            if(msg.room !== activeRoom) return;
            renderSingleMessageCard(msg);
        });

        function renderSingleMessageCard(msg) {
            let box = document.getElementById('chat-messages-box');
            let isMe = (msg.phone === currentUser.phone);
            
            let row = document.createElement('div');
            row.className = `msg-row ${isMe ? 'me' : 'them'}`;
            row.id = `msg-block-${msg.id}`;
            
            let contentHtml = '';
            if(msg.reply_to) {
                contentHtml += `<div class="reply-preview-box">رد على رسالة</div>`;
            }

            if(msg.file_type === 'image') {
                contentHtml += `<img src="${msg.text}" style="width:100%; max-width:260px; border-radius:8px; display:block; margin-bottom:5px;">`;
            } else if(msg.file_type === 'video') {
                contentHtml += `<video src="${msg.text}" controls style="width:100%; max-width:260px; border-radius:8px; display:block; margin-bottom:5px;"></video>`;
            } else if(msg.file_type === 'audio') {
                contentHtml += `<audio src="${msg.text}" controls style="width:100%; max-width:240px; display:block; margin-bottom:5px;"></audio>`;
            } else {
                contentHtml += `<p>${msg.text}</p>`;
            }

            let reactStr = msg.reactions ? `<span style="background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:10px; font-size:12px; margin-top:4px; display:inline-block;">${msg.reactions}</span>` : '';
            
            row.innerHTML = `
                <div class="msg-box">
                    <div class="msg-actions">
                        <span onclick="setReplyContext('${msg.id}', '${msg.text.substring(0,20)}')">🔄 رد</span>
                        <span onclick="reactToMessage('${msg.id}', '👍')">👍</span>
                        <span onclick="reactToMessage('${msg.id}', '❤️')">❤️</span>
                        <span onclick="triggerForwardMessage('${msg.text}', '${msg.file_type}')">➡️ تحويل</span>
                        ${isMe ? `<span onclick="triggerEditMessage('${msg.id}', '${msg.text}')">✏️ تعديل</span>` : ''}
                        ${isMe ? `<span onclick="triggerDeleteMessage('${msg.id}')" style="color:red;">🗑️ حذف</span>` : ''}
                    </div>
                    <strong style="font-size:12px; color:var(--neon-green); display:block; margin-bottom:3px;">${msg.sender}</strong>
                    ${contentHtml}
                    ${reactStr}
                    <div class="msg-meta">
                        <span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        <span style="color:var(--neon-green);">✓✓</span>
                    </div>
                </div>
            `;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('chat_history', (data) => {
            let box = document.getElementById('chat-messages-box');
            box.innerHTML = '';
            if(data.messages) {
                data.messages.forEach(m => renderSingleMessageCard(m));
            }
        });

        function setReplyContext(id, snippet) { replyContextId = id; let f = document.getElementById('reply-context-footer-container'); f.style.display = 'flex'; document.getElementById('reply-context-footer-text').innerText = `الرد على: ${snippet}...`; }
        function cancelReplyContext() { replyContextId = ''; document.getElementById('reply-context-footer-container').style.display = 'none'; }
        function reactToMessage(id, emoji) { socket.emit('update_reaction', { id: id, reactions: emoji, room: activeRoom }); }
        function triggerDeleteMessage(id) { if(confirm('هل تريد حذف الرسالة؟')) socket.emit('delete_message', { id: id, room: activeRoom }); }
        function triggerEditMessage(id, oldTxt) { let n = prompt('تعديل الرسالة:', oldTxt); if(n) socket.emit('edit_message', { id: id, text: n, room: activeRoom }); }
        function triggerForwardMessage(txt, type) { let targeted = prompt('رقم هاتف الشخص المستهدف:'); if(targeted) { socket.emit('message', { id: `msg-${Date.now()}`, room: `user_${targeted}`, sender: currentUser.name, phone: currentUser.phone, text: txt, file_type: type, file_name: 'رسالة محولة', reply_to: '' }); alert('تم التحويل'); } }

        socket.on('message_edited', (data) => { let el = document.querySelector(`#msg-block-${data.id} p`); if(el) el.innerText = data.text; });
        socket.on('message_deleted', (data) => { let el = document.getElementById(`msg-block-${data.id}`); if(el) el.remove(); });
        socket.on('reaction_updated', (data) => { socket.emit('join_room', { room: activeRoom }); });

        function searchUserByPhoneNumber() {
            let val = document.getElementById('phone-search-input').value.trim();
            if(val.length > 4) {
                socket.emit('find_user_by_phone', { search_phone: val });
            }
        }
        socket.on('user_search_result', (data) => {
            let h = document.getElementById('dynamic-search-results-holder');
            if(data.found) {
                h.innerHTML = `
                    <div class="chat-item" style="border: 1px dashed var(--neon-green);" onclick="activateDirectChat('user_${data.phone}', '${data.name}', '${data.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150'}')">
                        <img src="${data.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150'}">
                        <div class="info"><h4>${data.name}</h4><p>${data.status_text}</p></div>
                    </div>
                `;
            } else {
                h.innerHTML = `<p style="padding:10px; font-size:12px; color:red; text-align:center;">غير مسجل</p>`;
            }
        });

        function triggerNewStoryCreation() {
            let txt = prompt('نص الحالة:');
            let type = prompt('النوع (text أو image أو video):', 'text');
            let targetUrl = txt;
            if(type === 'image' || type === 'video') {
                targetUrl = prompt('رابط الميديا:');
            }
            if(targetUrl) {
                socket.emit('add_story', { sender: currentUser.name, phone: currentUser.phone, text: targetUrl, file_type: type });
            }
        }

        socket.on('new_story_alert', () => { socket.emit('get_stories'); });
        socket.on('stories_list', (data) => {
            let wrapper = document.getElementById('stories-list-wrapper');
            wrapper.innerHTML = '';
            if(data.stories) {
                data.stories.forEach(s => {
                    let mediaBlock = s.file_type === 'video' ? 'فيديو' : s.file_type === 'image' ? 'صورة' : s.text;
                    let div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => viewStoryModalDisplay(s);
                    div.innerHTML = `
                        <img src="${s.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150'}">
                        <div class="info">
                            <h4>${s.sender}</h4>
                            <p>${mediaBlock}</p>
                        </div>
                    `;
                    wrapper.appendChild(div);
                });
            }
        });

        function viewStoryModalDisplay(story) {
            let viewHtml = '';
            if(story.file_type === 'image') viewHtml = `<img src="${story.text}" style="width:100%; max-height:400px; object-fit:contain; border-radius:8px;">`;
            else if(story.file_type === 'video') viewHtml = `<video src="${story.text}" autoplay controls style="width:100%; max-height:400px; border-radius:8px;"></video>`;
            else viewHtml = `<div style="padding:40px 20px; font-size:22px; text-align:center; color:var(--neon-green); font-weight:bold;">${story.text}</div>`;
            
            let modal = document.createElement('div');
            modal.className = 'modal-view';
            modal.style.display = 'flex';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `
                <div class="modal-content-box" style="text-align:center;" onclick="event.stopPropagation()">
                    <h3 style="margin-bottom:15px; color:var(--neon-green);">${story.sender}</h3>
                    ${viewHtml}
                </div>
            `;
            document.body.appendChild(modal);
        }

        function openCreatorDialog() { document.getElementById('creator-modal').style.display = 'flex'; }
        function executeUnitCreation() {
            let name = document.getElementById('creator-name-input').value.trim();
            let type = document.getElementById('creator-type-select').value;
            if(!name) return;
            socket.emit('create_unit', { name: name, type: type, creator: currentUser.phone });
            document.getElementById('creator-name-input').value = '';
            document.getElementById('creator-modal').style.display = 'none';
        }
        socket.on('unit_created_alert', () => { socket.emit('get_units'); });
        socket.on('units_list', (data) => {
            let w = document.getElementById('units-list-wrapper');
            w.innerHTML = '';
            if(data.units) {
                data.units.forEach(u => {
                    let icon = u.type === 'channel' ? '📢' : '👥';
                    let div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => activateDirectChat(u.id, u.name, 'https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=150');
                    div.innerHTML = `
                        <div style="font-size:24px; margin-left:12px;">${icon}</div>
                        <div class="info">
                            <h4>${u.name}</h4>
                        </div>
                    `;
                    w.appendChild(div);
                });
            }
        });

        function openNewPostDialog() {
            let txt = prompt('نص المنشور:');
            let mUrl = prompt('رابط الصورة/الفيديو (اختياري):');
            let type = mUrl ? 'image' : 'text';
            if(txt) {
                socket.emit('add_feed_post', { sender: currentUser.name, phone: currentUser.phone, avatar: currentUser.avatar, text: txt, media_url: mUrl, file_type: type });
            }
        }
        socket.on('new_feed_post_alert', () => { socket.emit('get_feed_posts'); });
        socket.on('feed_posts_list', (data) => {
            let w = document.getElementById('feed-posts-wrapper');
            w.innerHTML = '';
            if(data.posts) {
                data.posts.forEach(p => {
                    let media = '';
                    if(p.media_url) media = `<img src="${p.media_url}">`;
                    let card = document.createElement('div');
                    card.className = 'feed-post-card';
                    card.innerHTML = `
                        <div class="feed-header">
                            <img src="${p.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150'}">
                            <div><strong>${p.sender}</strong></div>
                        </div>
                        <div class="feed-body">
                            <p>${p.text}</p>
                            ${media}
                        </div>
                    `;
                    w.appendChild(card);
                });
            }
        });

        function initiateWebRTCCall(type) {
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('call-screen-name').innerText = 'جاري الاتصال...';
            if(type === 'video') {
                document.getElementById('video-frame-block').style.display = 'block';
                navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                    localStream = stream;
                    document.getElementById('local-video-stream-el').srcObject = stream;
                }).catch(e => console.log("Camera bypass"));
            }
            socket.emit('call_signal', { target_phone: activeRoom.replace('user_', ''), sender_name: currentUser.name, avatar: currentUser.avatar, call_type: type, action: 'dial' });
        }

        socket.on('call_signal', (data) => {
            if(data.action === 'dial') {
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('call-screen-name').innerText = `مكالمة من: ${data.sender_name}`;
                document.getElementById('call-screen-avatar').src = data.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150';
                if(data.call_type === 'video') document.getElementById('video-frame-block').style.display = 'block';
            }
        });

        function acceptIncomingCallSignal() {
            document.getElementById('call-screen-name').innerText = "المكالمة نشطة";
        }

        function terminateActiveCallPipeline() {
            if(localStream) { localStream.getTracks().forEach(track => track.stop()); }
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('video-frame-block').style.display = 'none';
        }

        function applyVoiceFilterConfig() {
            let filter = document.getElementById('voice-changer-selector').value;
        }

        function triggerVoiceNavigator() {
            let cmd = prompt('المساعد الصوتي:');
            if(cmd && (cmd.includes('ذكاء') || cmd.includes('AI'))) {
                document.getElementById('ai-chat-item-trigger').click();
            }
        }

        function triggerSettingsDashboard() {
            document.getElementById('settings-name-input').value = currentUser.name;
            document.getElementById('settings-avatar-input').value = currentUser.avatar;
            document.getElementById('settings-status-text-input').value = 'Available';
            document.getElementById('settings-modal').style.display = 'flex';
        }
        function closeSettingsDashboard() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function saveProfileSettingsLive() {
            currentUser.name = document.getElementById('settings-name-input').value;
            currentUser.avatar = document.getElementById('settings-avatar-input').value;
            currentUser.wallpaper = document.getElementById('settings-wallpaper-input').value;
            
            if(currentUser.wallpaper) {
                document.getElementById('chat-messages-box').style.backgroundImage = `url('${currentUser.wallpaper}')`;
            }
            document.getElementById('display-profile-name').innerText = currentUser.name;
            document.getElementById('user-avatar-current').src = currentUser.avatar;
            
            socket.emit('update_profile_live', { phone: currentUser.phone, name: currentUser.name, avatar: currentUser.avatar, wallpaper: currentUser.wallpaper });
            closeSettingsDashboard();
        }

        function toggleThemeMode() { document.body.classList.toggle('light-mode'); }

        function toggleArcadeGameView() {
            let wrapper = document.getElementById('dino-game-wrapper');
            wrapper.style.display = wrapper.style.display === 'block' ? 'none' : 'block';
            if(wrapper.style.display === 'block') bootDinoArcadeGameEngine();
        }

        function bootDinoArcadeGameEngine() {
            let canvas = document.getElementById('dino-canvas');
            let ctx = canvas.getContext('2d');
            let dinoY = 120, isJumping = false, jumpSpeed = 0, obstacleX = 400;
            
            document.addEventListener('keydown', (e) => { if(e.code === 'Space' && dinoY >= 120) { isJumping = true; jumpSpeed = -10; } });
            
            function gameLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if(isJumping) { dinoY += jumpSpeed; jumpSpeed += 0.6; if(dinoY >= 120) { dinoY = 120; isJumping = false; } }
                obstacleX -= 4; if(obstacleX < -20) obstacleX = 400;
                
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(0, 140, 400, 10);
                ctx.fillStyle = '#fff'; ctx.fillRect(30, dinoY, 20, 20);
                ctx.fillStyle = 'red'; ctx.fillRect(obstacleX, 120, 15, 20);
                
                requestAnimationFrame(gameLoop);
            }
            gameLoop();
        }

        function buildEmojiTrayMatrix() {
            let tray = document.getElementById('emoji-tray-popover');
            let emojis = ['😊','😂','❤️','👍','🔥','🎉','👏'];
            tray.innerHTML = '';
            emojis.forEach(e => {
                let s = document.createElement('span');
                s.style.cursor = 'pointer'; s.style.fontSize = '20px'; s.style.textAlign = 'center';
                s.innerText = e;
                s.onclick = () => { document.getElementById('chat-message-input-field').value += e; tray.style.display = 'none'; };
                tray.appendChild(s);
            });
        }
        function toggleEmojiTray() { let t = document.getElementById('emoji-tray-popover'); t.style.display = t.style.display === 'grid' ? 'none' : 'grid'; }
    </script>
</body>
</html>
