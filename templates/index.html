<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نايل شات الآمن | Nile Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        #chat-container { width: 100%; max-width: 600px; height: 100vh; background: #fff; display: flex; flex-direction: column; margin: 0 auto; }
        header { background-color: #008069; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        #chat-window { flex: 1; padding: 20px; background-color: #efeae2; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 8px; font-size: 15px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-word; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        footer { display: flex; padding: 10px; gap: 10px; background: #f0f2f5; border-top: 1px solid #ccc; align-items: center; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 15px; }
        #send-btn { border: none; border-radius: 50%; background: #008069; color: white; width: 45px; height: 45px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="chat-container">
        <header id="chat-header">نايل شات 💬</header>
        <div id="chat-window"></div>
        <footer>
            <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." onkeypress="handleKey(event)">
            <button id="send-btn" onclick="sendMessage()">🚀</button>
        </footer>
    </div>

    <script>
        const socket = io();
        
        // طلب الاسم المستعار واسم الغرفة مرة واحدة عند الدخول
        let myName = prompt("من فضلك اكتب اسمك المستعار للدخول للشات:") || "مجهول";
        let myRoom = prompt("اكتب رقم أو اسم الغرفة السرية (اتفق عليها مع صاحبك):") || "عامة";
        
        document.getElementById('chat-header').innerText = `نايل شات 💬 (${myName}) - غرفة: ${myRoom}`;

        // إرسال طلب دخول الغرفة للسيرفر فوراً
        socket.emit('join_room', { username: myName, room: myRoom });

        // استقبال الرسائل وعرضها
        socket.on('message', function(data) {
            const chatWindow = document.getElementById('chat-window');
            const messageDiv = document.createElement('div');
            
            messageDiv.className = 'message ' + (data.sender === myName ? 'sent' : 'received');
            messageDiv.innerHTML = '<b>' + data.sender + ':</b> ' + data.content;
            
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // دالة إرسال الرسالة المربوطة بالزرار المظبوطة
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text !== "") {
                socket.emit('new_message', { 
                    room: myRoom,
                    sender: myName, 
                    content: text 
                });
                input.value = "";
            }
        }

        function handleKey(event) {
            if (event.key === "Enter") { sendMessage(); }
        }
    </script>
</body>
</html>
