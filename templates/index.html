<!DOCTYPE html>

        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: #fff; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        header { background-color: #008069; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
        
        #call-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: white; padding: 5px; }

        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        footer { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; background: white; border: none; padding: 12px; border-radius: 8px; outline: none; font-size: 15px; }
        .btn { border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: white; }
        #send-btn { background: #008069; }
        #audio-btn { background: #ea4335; }
        
        #call-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 128, 105, 0.95); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; gap: 20px; }
        #call-status { font-size: 20px; font-weight: bold; }
        .call-action-btn { border: none; padding: 12px 25px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; color: white; }
        #answer-btn { background: #2ecc71; }
        #hangup-btn { background: #e74c3c; }
        audio { max-width: 100%; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div id="chat-container">
        <header>
            <span id="chat-header-title">نايل شات</span>
            <button id="call-btn" onclick="startVoiceCall()">📞</button>
        </header>
        
        <div id="chat-window"></div>
        
        <footer>
            <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." onkeypress="handleKey(event)">
            <button id="audio-btn" class="btn" onclick="toggleRecording()">🎤</button>
            <button id="send-btn" class="btn" onclick="sendMessage()">🚀</button>
        </footer>

        <div id="call-overlay">
            <h2 id="caller-name">مكالمة صوتية</h2>
            <p id="call-status">يرن...</p>
            <div style="display: flex; gap: 20px;">
                <button id="answer-btn" class="call-action-btn" onclick="answerCall()">رد ✅</button>
                <button id="hangup-btn" class="call-action-btn" onclick="endCall()">إغلاق ❌</button>
            </div>
        </div>
    </div>
