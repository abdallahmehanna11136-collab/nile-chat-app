<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>نايل شات | Nile Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* شاشة تسجيل الدخول */
        #login-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; display: block; }
        #login-container h2 { color: #008069; margin-bottom: 20px; }
        .input-group { display: flex; margin-bottom: 15px; gap: 5px; }
        .input-group select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        #login-btn { width: 100%; background: #008069; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        /* شاشة الشات الرئيسي */
        #app-container { width: 100%; max-width: 600px; height: 95vh; background: #fff; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        header { background-color: #008069; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .user-info h1 { font-size: 18px; font-weight: 500; }
        .developer-name { font-size: 11px; color: #deff9a; }
        .call-actions button { background: none; border: none; font-size: 20px; cursor: pointer; margin-right: 10px; }

        #chat-window { flex: 1; padding: 20px; background-color: #efeae2; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 8px; font-size: 15px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-word; }
        .sent { background: #d9fdd3; align-self: flex-end; border-top-left-radius: 0; }
        .received { background: #fff; align-self: flex-start; border-top-right-radius: 0; }
        .user-label { font-weight: bold; font-size: 12px; color: #008069; display: block; margin-bottom: 3px; }
        
        footer { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; background: white; border: none; padding: 12px; border-radius: 8px; }
        .action-btn { background: #008069; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        #voice-btn { background: #25d366; }
    </style>
</head>

            </select>
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
