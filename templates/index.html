<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نايل شات | Nile Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: #fff; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        header { background-color: #008069; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        
        #chat-window { flex: 1; padding: 20px; background-color: #efeae2; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 8px; font-size: 15px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-word; line-height: 1.4; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        footer { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; background: white; border: none; padding: 12px; border-radius: 8px; outline: none; font-size: 15px; }
        .btn { border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: white; }
        #send-btn { background: #008069; }
    </style>
</head>
<body>

    <div id="chat-container">
        <header id="chat-header">نايل شات 💬</header>
        <div id="chat-window"></div>
        <footer>
            <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." onkeypress="handleKey(event)">
            <button id="send-btn" class="btn" onclick="sendMessage()">🚀</button>
        </footer>
    </div>

<script>
    const socket = io();
    
    // طلب الاسم أول ما الصفحة تفتح
    let myName = prompt("من فضلك اكتب اسمك المستعار للدخول للشات:") || "مجهول";
    document.getElementById('chat-header').innerText = "نايل شات (" + myName + ")";

    socket.emit('user_join', myName);

    // استقبال الرسائل النصية وعرضها
    socket.on('message', function(data) {
        const chatWindow = document.getElementById('chat-window');
        const messageDiv = document.createElement('div');
        
        if (data.sender === myName) {
            messageDiv.className = 'message sent';
        } else {
            messageDiv.className = 'message received';
        }
        
        messageDiv.innerHTML = '<b>' + data.sender + ':</b> ' + data.content;
        
        chatWindow.appendChild(messageDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    // إرسال الرسالة بالزرار
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (text !== "") {
            socket.emit('new_message', { sender: myName, content: text });
            input.value = "";
        }
    }

    // إرسال الرسالة بزرار Enter
    function handleKey(event) {
        if (event.key === "Enter") { sendMessage(); }
    }
</script>
</body>
</html>
