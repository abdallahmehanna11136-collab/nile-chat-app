<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نايل شات الخاص | Nile Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #008069; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        
        #sidebar { background: white; padding: 10px; border-bottom: 1px solid #ccc; display: flex; flex-direction: column; gap: 10px; }
        #chat-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .chat-user-btn { background: #eef; border: 1px solid #008069; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .chat-user-btn.active { background: #008069; color: white; }
        #start-new-btn { background: #008069; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #chat-window { flex: 1; padding: 20px; background-color: #efeae2; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 8px; font-size: 15px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-word; }
        .sent { background: #d9fdd3; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; }
        
        footer { display: flex; padding: 10px; gap: 10px; background: #f0f2f5; border-top: 1px solid #ccc; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 15px; }
        #send-btn { border: none; border-radius: 5px; background: #008069; color: white; padding: 0 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header id="chat-header">نايل شات الخاص 💬</header>

    <div id="sidebar">
        <button id="start-new-btn" onclick="startNewChat()">+ ابدأ محادثة مع شخص جديد</button>
        <div id="chat-list"></div>
    </div>

    <div id="chat-window"></div>

    <footer>
        <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." onkeypress="handleKey(event)">
        <button id="send-btn" onclick="sendMessage()">إرسال</button>
    </footer>

                        }
                    });
                });
